<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Code Vault | Claim Rewards</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --nexus-green: #00ff88; --nexus-yellow: #E4FF00; }
        body { 
            background: radial-gradient(circle at center, #001a11 0%, #050505 100%); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            overflow: hidden;
        }

        .vault-box {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #222;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
        }

        .shield-icon {
            font-size: 4rem;
            color: var(--nexus-green);
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--nexus-green);
        }

        #timer-text {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .code-display {
            display: none;
            background: #000;
            border: 2px dashed var(--nexus-yellow);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .code-display h2 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--nexus-yellow);
            letter-spacing: 8px;
            text-shadow: 0 0 10px var(--nexus-yellow);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instruction {
            font-size: 0.8rem;
            color: #444;
            margin-top: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="vault-box">
        <div class="shield-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1 style="margin:0 0 10px; font-size:1.8rem;">ARENA <span style="color:var(--nexus-green)">VAULT</span></h1>
        
        <div id="countdown-area">
            <p id="timer-text">DECRYPTING CODE: <span id="seconds" style="color:white">15</span>s</p>
            <div style="width:100%; height:4px; background:#222; border-radius:10px; overflow:hidden;">
                <div id="progress" style="width:0%; height:100%; background:var(--nexus-green); transition: 1s linear;"></div>
            </div>
        </div>

        <div id="code-area" class="code-display">
            <p style="font-size:0.7rem; color:#888; margin-bottom:10px;">YOUR SECRET CODE IS:</p>
            <!-- IMPORTANT: Change this code to match what you set in Dashboard -->
            <h2 id="finalCode">NEXUS100</h2>
            <p style="font-size:0.7rem; color:var(--nexus-green); margin-top:10px;">COPY AND PASTE IN PREDICTION CENTER</p>
        </div>

        <div class="instruction">
            Verification required to claim 100 ₦
        </div>
    </div>

    <script>
        let timeLeft = 15;
        const secondsSpan = document.getElementById('seconds');
        const progressBar = document.getElementById('progress');
        const countdownArea = document.getElementById('countdown-area');
        const codeArea = document.getElementById('code-area');

        // Start Timer
        const timer = setInterval(() => {
            timeLeft--;
            secondsSpan.innerText = timeLeft;
            progressBar.style.width = ((15 - timeLeft) / 15 * 100) + "%";

            if (timeLeft <= 0) {
                clearInterval(timer);
                countdownArea.style.display = 'none';
                codeArea.style.display = 'block';
            }
        }, 1000);

        async function openAdArea() {
    if(!currentUser) return toggleAuthModal();
    
    // 1. Fetch current settings (To get the link)
    const setRes = await fetch(`${API}/admin/ad-settings`);
    const settings = await setRes.json();
    
    // 2. Update the link in the UI
    const linkBtn = document.querySelector('#adOverlay .join-btn[target="_blank"]');
    linkBtn.href = settings.link;
    linkBtn.innerText = `1. OPEN LINK (FOR ${settings.reward}₦)`;

    // 3. Generate the unique code
    await fetch(`${API}/ad/generate-code/${currentUser._id}`);
    
    document.getElementById('adOverlay').style.display = 'flex';
        }

        // Fetch current code from your server if you want it to be fully automatic
        async function fetchLiveCode() {
    // Get the user from localStorage (since vault is on the same domain)
    const user = JSON.parse(localStorage.getItem('nexus_user'));
    
    if(!user) {
        document.getElementById('finalCode').innerText = "LOGIN REQUIRED";
        return;
    }

    try {
        // Ask the server for THIS specific user's code
        const res = await fetch(`https://nl-server-k7i9.onrender.com/api/ad/get-my-code/${user._id}`);
        const data = await res.json();
        
        if(data.code) {
            document.getElementById('finalCode').innerText = data.code;
        } else {
            document.getElementById('finalCode').innerText = "EXPIRED";
        }
    } catch(e) { 
        document.getElementById('finalCode').innerText = "ERROR";
    }
        }
        fetchLiveCode();
    </script>
</body>
</html>
