<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Global Rankings | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #050505; color: white; padding-top: 100px; }
        .ranking-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 10px;
        }

        .leaderboard-table th {
            text-transform: uppercase;
            color: var(--accent-yellow);
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #222;
        }

        .player-row {
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .player-row:hover {
            background: rgba(0, 65, 255, 0.1);
            transform: scale(1.01);
        }

        .player-row td { padding: 20px 15px; font-weight: 700; font-size: 1.2rem; }
        
        /* Rank Styles */
        .rank-num { font-style: italic; color: var(--gray-text); }
        .top-1 { color: #FFD700; font-size: 1.5rem; } /* Gold */
        
        /* Trend Icons */
        .trend-up { color: #00ff88; margin-left: 10px; }
        .trend-down { color: #ff4444; margin-left: 10px; }
        
        .pts-cell { color: var(--accent-yellow); font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="ranking-container">
    <h1 style="text-align:center;">TOP <span style="color:var(--accent-yellow)">STRIKERS</span></h1>
    <table class="leaderboard-table">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player Name</th>
                <th>Wins</th>
                <th>Total Pts</th>
            </tr>
        </thead>
        <tbody id="ranking-body">
            <tr><td colspan="4" style="text-align:center;">Loading Arena Data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function loadRankings() {
        const tbody = document.getElementById('ranking-body');
        try {
            // REPLACE THIS URL WITH YOUR ACTUAL RENDER URL
            const res = await fetch('https://your-render-app-name.onrender.com/api/rankings');
            const players = await res.json();

            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No Players Found. Check Database.</td></tr>';
                return;
            }

            tbody.innerHTML = players.map((player, index) => {
                const currentRank = index + 1;
                const oldRank = player.previousRank || 0;
                let trendIcon = '';

                // Trend logic
                if (oldRank !== 0) {
                    if (oldRank > currentRank) {
                        trendIcon = '<i class="fa-solid fa-caret-up" style="color:#00ff88; margin-left:8px;"></i>';
                    } else if (oldRank < currentRank) {
                        trendIcon = '<i class="fa-solid fa-caret-down" style="color:#ff4444; margin-left:8px;"></i>';
                    }
                }

                return `
                <tr class="player-row">
                    <td class="rank-num">#${currentRank}</td>
                    <td>${player.name} ${trendIcon}</td>
                    <td>${player.wins}</td>
                    <td style="color:#E4FF00;">${player.points}</td>
                </tr>`;
            }).join('');

        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Server Connection Failed.</td></tr>';
            console.error("Rankings error:", error);
        }
    }
    loadRankings();
</script>
    </script>
</body>
</html>
