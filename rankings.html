<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Global Rankings | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --accent-yellow: #E4FF00; --green: #00ff88; --red: #ff4444; --nexus-blue: #0041FF; }
        body { background: #050505; color: white; padding-top: 80px; font-family: 'Rajdhani', sans-serif; margin: 0; }
        
        .ranking-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* CLEAN HEADER AREA */
        .rank-header-box { text-align: center; margin-bottom: 30px; }
        .rank-header-box h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .home-btn { color: #888; text-decoration: none; font-weight: 700; display: inline-block; margin-top: 10px; transition: 0.3s; }
        .home-btn:hover { color: white; }

        /* SEARCH BAR STYLING */
        .search-wrapper { margin-bottom: 25px; position: relative; }
        #rankSearch { 
            width: 100%; padding: 15px 15px 15px 45px; background: #111; 
            border: 1px solid #222; color: white; border-radius: 12px; 
            font-family: inherit; outline: none; transition: 0.3s;
        }
        #rankSearch:focus { border-color: var(--accent-yellow); box-shadow: 0 0 15px rgba(228, 255, 0, 0.1); }
        .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #555; }

        /* TABLE RESPONSIVE WRAPPER (Fixes "Gathering") */
        .table-scroll { 
            width: 100%; overflow-x: auto; 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 15px; border: 1px solid #1a1a1a; 
        }

        .leaderboard-table { width: 100%; border-collapse: collapse; min-width: 700px; /* Forces Desktop-like width */ }
        .leaderboard-table th { 
            text-transform: uppercase; color: #555; padding: 20px 15px; 
            text-align: left; border-bottom: 1px solid #1a1a1a; font-size: 0.75rem; letter-spacing: 1px;
        }

        .player-row { border-bottom: 1px solid #111; transition: 0.2s; cursor: pointer; }
        .player-row:hover { background: rgba(0, 65, 255, 0.05); }
        .player-row td { padding: 18px 15px; font-weight: 700; font-size: 1.1rem; }

        /* COLUMN SPECIFICS */
        .col-rank { width: 60px; color: #444; font-style: italic; }
        .col-name { min-width: 200px; }
        .col-stat { width: 80px; text-align: center !important; }
        .col-perf { min-width: 150px; color: var(--accent-yellow); font-size: 0.85rem !important; }
        .col-pts { width: 80px; text-align: center !important; color: var(--accent-yellow); font-size: 1.3rem !important; }

        /* BUTTON DESIGN */
        .export-area { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .pdf-btn { 
            background: var(--accent-yellow); color: black; padding: 10px 20px; 
            font-weight: 800; border: none; cursor: pointer; 
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s;
        }
        .pdf-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(228, 255, 0, 0.3); }

        /* --- PLAYER CARD MODAL --- */
        .roster-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 99999;
        }
        .efootball-card {
            width: 320px; height: 460px; position: relative; border-radius: 25px;
            overflow: hidden; box-shadow: 0 0 50px #000; background: #000; border: 1px solid #333;
        }
        .card-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .card-avatar { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); width: 280px; height: 280px; object-fit: contain; z-index: 2; }
        .card-data { position: absolute; bottom: 65px; width: 100%; text-align: center; z-index: 3; pointer-events: none; }
        .card-name { font-size: 1.8rem; font-weight: 700; color: white; text-transform: uppercase; text-shadow: 0 2px 10px #000; margin: 0 0 10px 0; }
        .card-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 0 20px; }
        .stat-item small { display: block; font-size: 0.55rem; color: var(--accent-yellow); font-weight: bold; }
        .stat-item b { font-size: 0.9rem; color: white; }

        .status-msg { text-align: center; padding: 40px; font-weight: bold; color: #555; }
        .value-cell {
    color: #00ff88; /* Neon Green for money */
    font-family: 'monospace';
    font-weight: 800;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>

    <div class="ranking-container">
        <div class="rank-header-box">
            <h1>TOP <span style="color:var(--accent-yellow)">STRIKERS</span></h1>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-house"></i> RETURN HOME</a>
        </div>

        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="rankSearch" onkeyup="filterRankings()" placeholder="Search Strikers by name...">
        </div>
        
        <div class="export-area">
            <button onclick="exportToPDF()" class="pdf-btn">
                <i class="fa-solid fa-file-pdf"></i> EXPORT PDF
            </button>
        </div>

        <div class="table-scroll">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th class="col-rank">Rank</th>
                        <th class="col-name">Player Name</th>
                        <th class="col-stat">GS</th>
                        <th class="col-stat">GA</th>
                        <th style="text-align:center;">Value</th>
                        <th class="col-perf">Performance</th>
                        <th class="col-pts">Total Pts</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <tr><td colspan="6" class="status-msg">Initializing Arena Servers...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- MODAL POPUP -->
        <div id="playerCardOverlay" class="roster-overlay" onclick="closePlayerCard()">
            <div id="cardContent" onclick="event.stopPropagation()"></div>
        </div>
    </div>

<script>
const API = "https://nl-server-k7i9.onrender.com/api";
let allPlayers = [];

async function loadRankings() {
    const tbody = document.getElementById('ranking-body');
    try {
        const response = await fetch(`${API}/rankings`);
        allPlayers = await response.json();
        renderTable(allPlayers);
    } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6" class="status-msg">Database Sync Paused.</td></tr>';
    }
}

function calculateMarketValue(p) {
    // STARTING BASE: 10 Million ₦
    let baseValue = 10000000;
    
    // CALCULATION LOGIC
    let pointsBonus = (p.points || 0) * 1000000;       // +1M per Point
    let goalsBonus = (p.goalsFor || 0) * 500000;      // +500k per Goal Scored
    let winBonus = (p.wins || 0) * 2000000;           // +2M per Win
    let defensePenalty = (p.goalsAgainst || 0) * 200000; // -200k per Goal Conceded

    let finalValue = baseValue + pointsBonus + goalsBonus + winBonus - defensePenalty;

    // MINIMUM VALUE: 5 Million ₦
    if (finalValue < 5000000) finalValue = 5000000;

    // FORMATTING (e.g., 25,500,000 -> 25.5M)
    return (finalValue / 1000000).toFixed(1) + "M";
}

function renderTable(data) {
    const tbody = document.getElementById('ranking-body');
    tbody.innerHTML = data.map((player, index) => {
        const currentRank = index + 1;
        const oldRank = player.previousRank || 0;
        let trendIcon = '';
        if (oldRank !== 0) {
            if (oldRank > currentRank) trendIcon = '<i class="fa-solid fa-caret-up" style="color:var(--green); margin-left:8px;"></i>';
            else if (oldRank < currentRank) trendIcon = '<i class="fa-solid fa-caret-down" style="color:var(--red); margin-left:8px;"></i>';
        }

        // Calculate the dynamic market value
        const marketValue = calculateMarketValue(player);

        return `
        <tr class="player-row" onclick="viewPlayerCard('${player.name}')">
            <td class="rank-num">#${currentRank}</td>
            <td style="font-weight:700;">
                ${player.name} ${trendIcon} 
                <i class="fa-solid fa-circle-info" style="font-size:0.7rem; color:#444; margin-left:5px;"></i>
            </td>
            <td style="text-align:center;">${player.goalsFor || 0}</td>
            <td style="text-align:center;">${player.goalsAgainst || 0}</td>
            <td class="value-cell" style="text-align:center;">${marketValue} ₦</td>
            <td class="pts-cell" style="text-align:right;">${player.points || 0}</td>
        </tr>`;
    }).join('');
}

function filterRankings() {
    const query = document.getElementById('rankSearch').value.toLowerCase();
    const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(query));
    renderTable(filtered);
}

function viewPlayerCard(name) {
    const p = allPlayers.find(x => x.name === name);
    const content = document.getElementById('cardContent');
    const marketValue = calculateMarketValue(p); // Get the same calculated value

    content.innerHTML = `
        <div class="efootball-card">
            <img src="card.jpg" class="card-frame" onerror="this.src='https://i.ibb.co/3ykSDRN/F5k-IL2UWUAAw-C8g.jpg'">
            <img src="${p.avatar || 'https://i.postimg.cc/85zXY7mB/default-avatar.png'}" class="card-avatar">
            
            <div class="card-data">
                <h2 class="card-name">${p.name}</h2>
                <div class="card-stats">
                    <div class="stat-item"><small>STYLE</small><b>${p.playstyle || 'BAL'}</b></div>
                    <div class="stat-item"><small>VALUE</small><b style="color:var(--accent-yellow)">${marketValue} ₦</b></div>
                    <div class="stat-item"><small>POINTS</small><b>${p.points}</b></div>
                </div>
                <div style="color:rgba(255,255,255,0.4); font-size:0.5rem; margin-top:10px; letter-spacing:2px;">
                    NEXUS NFA CERTIFIED ASSET
                </div>
            </div>
        </div>
    `;
    document.getElementById('playerCardOverlay').style.display = 'flex';
}

function closePlayerCard() { document.getElementById('playerCardOverlay').style.display = 'none'; }

function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text("NEXUS LEGENDS ARENA RANKINGS", 14, 20);
    doc.autoTable({ html: ".leaderboard-table", startY: 30, theme: 'grid', headStyles: { fillColor: [0, 65, 255] } });
    doc.save("Nexus_Rankings.pdf");
}

loadRankings();
</script>
</body>
</html>
