<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1024">
    <title>Global Rankings | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --accent-yellow: #E4FF00; --green: #00ff88; --red: #ff4444; }
        body { background: #050505; color: white; padding-top: 100px; font-family: 'Rajdhani', sans-serif; }
        .ranking-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 10px;
        }

        .leaderboard-table th {
            text-transform: uppercase;
            color: var(--accent-yellow);
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #222;
        }

        .player-row {
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .player-row:hover {
            background: rgba(0, 65, 255, 0.1);
            transform: scale(1.01);
        }

        .player-row td { padding: 20px 15px; font-weight: 700; font-size: 1.2rem; }
        
        .rank-num { font-style: italic; color: #888; }
        .pts-cell { color: #E4FF00; font-size: 1.4rem; }

        .status-msg { text-align: center; padding: 20px; font-weight: bold; }
        .error-msg { color: #ff4444; }
        .retry-btn { 
            background: #444; color: white; border: none; padding: 5px 15px; 
            cursor: pointer; border-radius: 4px; margin-top: 10px; 
        }

        /* EFOOTBALL PRO PLAYER CARD */
        .efootball-card {
            width: 320px;
            height: 450px;
            margin: 0 auto;
            background-image: url('https://i.postimg.cc/yYvZbK5n/F5k-IL2UWUAAw-C8g.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .card-avatar {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 280px;
            object-fit: contain;
            z-index: 1;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .card-info-overlay {
            position: absolute;
            bottom: 65px;
            width: 100%;
            text-align: center;
            z-index: 2;
        }

        .card-player-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
            margin: 0;
        }

        .card-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 0 25px;
            margin-top: 10px;
        }

        .card-stat-item small { display: block; font-size: 0.6rem; color: var(--accent-yellow); text-transform: uppercase; }
        .card-stat-item b { font-size: 0.9rem; color: white; }

        #playerCardOverlay .ann-modal { background: transparent; border: none; box-shadow: none; padding: 0; }

        .roster-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="ranking-container">
        <h1 style="text-align:center;">TOP <span style="color:var(--accent-yellow)">STRIKERS</span></h1>
        <div style="text-align:center; margin-bottom: 20px;">
            <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;"><i class="fa-solid fa-house"></i> HOME</a>
        </div>

        <div style="margin-bottom: 20px;">
            <input type="text" id="rankSearch" onkeyup="filterRankings()" placeholder="🔍 Search Strikers by name..." style="width:100%; padding:15px; background:#111; border:1px solid #333; color:white; border-radius:10px; font-family:inherit; outline:none;">
        </div>
        
        <div style="text-align: right; margin-bottom: 20px;">
            <button onclick="exportToPDF()" style="background:var(--accent-yellow); color:black; padding:10px 20px; font-weight:bold; border:none; cursor:pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);">
                <i class="fa-solid fa-file-pdf"></i> EXPORT RANKINGS PDF
            </button>
        </div>

        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player Name</th>
                    <th style="text-align:center;">GS</th>
                    <th style="text-align:center;">GA</th>
                    <th>Performance</th>
                    <th style="text-align:right;">Pts</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                <tr>
                    <td colspan="6" class="status-msg">Synchronizing with Arena Servers...</td>
                </tr>
            </tbody>
        </table>

        <!-- PLAYER CARD MODAL -->
        <div id="playerCardOverlay" class="roster-overlay" onclick="closePlayerCard()">
            <div class="ann-modal" onclick="event.stopPropagation()">
                <div id="cardContent"></div>
            </div>
        </div>
    </div>

<script>
const API = "https://nl-server-k7i9.onrender.com/api";
let allPlayers = [];

// --- PDF EXPORT ---
function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text("NEXUS LEGENDS - EFOOTBALL RANKINGS", 14, 20);
    doc.autoTable({
        html: ".leaderboard-table", startY: 40, theme: 'grid',
        headStyles: { fillColor: [0, 65, 255] }, styles: { font: 'helvetica', fontSize: 10 }
    });
    doc.save("Nexus_Legends_Rankings.pdf");
}

// --- MAIN LOADING FUNCTION ---
async function loadRankings() {
    const tbody = document.getElementById('ranking-body');
    try {
        const response = await fetch(`${API}/rankings`);
        if (!response.ok) throw new Error("Offline");
        allPlayers = await response.json();

        if (allPlayers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="status-msg">No strikers registered.</td></tr>';
            return;
        }

        renderTable(allPlayers);
    } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6" class="status-msg error-msg">Connection error. <button onclick="loadRankings()">Retry</button></td></tr>';
    }
}

// --- RENDER TABLE ---
function renderTable(data) {
    const tbody = document.getElementById('ranking-body');
    tbody.innerHTML = data.map((player, index) => {
        const currentRank = index + 1;
        const oldRank = player.previousRank || 0;
        let trendIcon = '';
        if (oldRank !== 0) {
            if (oldRank > currentRank) trendIcon = '<i class="fa-solid fa-caret-up" style="color:var(--green); margin-left:8px;"></i>';
            else if (oldRank < currentRank) trendIcon = '<i class="fa-solid fa-caret-down" style="color:var(--red); margin-left:8px;"></i>';
        }

        return `
        <tr class="player-row" onclick="viewPlayerCard('${player.name}')" style="cursor:pointer;">
            <td class="rank-num">#${currentRank}</td>
            <td style="font-weight:700;">${player.name} ${trendIcon} <i class="fa-solid fa-circle-info" style="font-size:0.7rem; color:#444; margin-left:5px;"></i></td>
            <td style="text-align:center; color:var(--green); font-family:monospace;">${player.goalsFor || 0}</td>
            <td style="text-align:center; color:var(--red); font-family:monospace;">${player.goalsAgainst || 0}</td>
            <td style="font-size:0.85rem; color:var(--accent-yellow); font-weight:bold;">${player.trophies || '-'}</td>
            <td class="pts-cell" style="text-align:right;">${player.points || 0}</td>
        </tr>`;
    }).join('');
}

// --- SEARCH ---
function filterRankings() {
    const query = document.getElementById('rankSearch').value.toLowerCase();
    const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(query));
    renderTable(filtered);
}

// --- VIEW PLAYER CARD ---
function viewPlayerCard(name) {
    const p = allPlayers.find(x => x.name === name);
    const content = document.getElementById('cardContent');
    
    content.innerHTML = `
        <div class="efootball-card">
            <img src="${p.avatar || 'https://i.postimg.cc/yYvZbK5n/F5k-IL2UWUAAw-C8g.jpg'}" class="card-avatar">
            <div class="card-info-overlay">
                <h2 class="card-player-name">${p.name}</h2>
                <div class="card-stats-grid">
                    <div class="card-stat-item"><small>STYLE</small><b>${p.playstyle || 'BAL'}</b></div>
                    <div class="card-stat-item"><small>FORMATION</small><b>${p.formation || 'DEF'}</b></div>
                    <div class="card-stat-item"><small>POINTS</small><b>${p.points}</b></div>
                </div>
                <div style="color:rgba(255,255,255,0.6); font-size:0.6rem; margin-top:8px; letter-spacing:2px;">NEXUS LEGENDS OFFICIAL</div>
            </div>
        </div>
    `;
    document.getElementById('playerCardOverlay').style.display = 'flex';
}

function closePlayerCard() { document.getElementById('playerCardOverlay').style.display = 'none'; }

// Start
loadRankings();
</script>
</body>
</html>
