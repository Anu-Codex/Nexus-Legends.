<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Global Rankings | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background: #050505; color: white; padding-top: 100px; font-family: 'Rajdhani', sans-serif; }
        .ranking-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 10px;
        }

        .leaderboard-table th {
            text-transform: uppercase;
            color: var(--accent-yellow);
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #222;
        }

        .player-row {
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .player-row:hover {
            background: rgba(0, 65, 255, 0.1);
            transform: scale(1.01);
        }

        .player-row td { padding: 20px 15px; font-weight: 700; font-size: 1.2rem; }
        
        .rank-num { font-style: italic; color: #888; }
        .pts-cell { color: #E4FF00; font-size: 1.4rem; }

        .status-msg { text-align: center; padding: 20px; font-weight: bold; }
        .error-msg { color: #ff4444; }
        .retry-btn { 
            background: #444; color: white; border: none; padding: 5px 15px; 
            cursor: pointer; border-radius: 4px; margin-top: 10px; 
        }
    </style>
</head>
<body>

    <div class="ranking-container">
        <h1 style="text-align:center;">TOP <span style="color:var(--accent-yellow)">STRIKERS</span></h1>
        
        <div style="text-align: right; margin-bottom: 20px;">
            <button onclick="exportToPDF()" style="background:var(--accent-yellow); color:black; padding:10px 20px; font-weight:bold; border:none; cursor:pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);">
                <i class="fa-solid fa-file-pdf"></i> EXPORT RANKINGS PDF
            </button>
        </div>

        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player Name</th>
                    <th>Wins</th>
                    <th>Total Pts</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                <tr>
                    <td colspan="4" class="status-msg">Synchronizing with Arena Servers...</td>
                </tr>
            </tbody>
        </table>
    </div>

<script>
// --- PDF EXPORT FUNCTION (UNTOUCHED) ---
function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text("NEXUS LEGENDS - EFOOTBALL RANKINGS", 14, 20);
    doc.setFontSize(11);
    doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 30);
    const table = document.querySelector(".leaderboard-table");
    doc.autoTable({
        html: table,
        startY: 40,
        theme: 'grid',
        headStyles: { fillColor: [0, 65, 255] },
        styles: { font: 'helvetica', fontSize: 10 }
    });
    doc.save("Nexus_Legends_Rankings.pdf");
}

// --- NEW SYNCED CONNECTION LOGIC ---
const API_BASE = 'https://nl-server-k7i9.onrender.com/api';

async function loadRankings() {
    const tbody = document.getElementById('ranking-body');
    
    try {
        // We use the exact same fetch style as your dashboard
        const res = await fetch(`${API_BASE}/rankings`);
        
        if (!res.ok) throw new Error("Sync Failed");

        const players = await res.json();

        if (!players || players.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="status-msg">Arena Empty. Check Dashboard.</td></tr>';
            return;
        }

        // Generate Table Content
        let tableContent = "";
        players.forEach((player, index) => {
            const currentRank = index + 1;
            const oldRank = player.previousRank || 0;
            let trendIcon = '';

            if (oldRank !== 0) {
                if (oldRank > currentRank) {
                    trendIcon = '<i class="fa-solid fa-caret-up" style="color:#00ff88; margin-left:8px;"></i>';
                } else if (oldRank < currentRank) {
                    trendIcon = '<i class="fa-solid fa-caret-down" style="color:#ff4444; margin-left:8px;"></i>';
                }
            }

            tableContent += `
            <tr class="player-row">
                <td class="rank-num">#${currentRank}</td>
                <td>${player.name} ${trendIcon}</td>
                <td>${player.wins || 0}</td>
                <td class="pts-cell">${player.points || 0}</td>
            </tr>`;
        });

        tbody.innerHTML = tableContent;

    } catch (error) {
        console.error("Rankings Error:", error);
        tbody.innerHTML = `
            <tr>
                <td colspan="4" class="status-msg error-msg">
                    <i class="fa-solid fa-wifi-slash"></i> CONNECTION ERROR<br>
                    <small style="color:#888;">Retrying in 5 seconds...</small><br>
                    <button class="retry-btn" onclick="loadRankings()">RETRY NOW</button>
                </td>
            </tr>`;
        
        // Auto-retry every 5 seconds
        setTimeout(loadRankings, 5000);
    }
}

// Run immediately
loadRankings();
</script>
</body>
</html>
