<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Arena | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --live-red: #ff003c; --neon-green: #00ff88; --accent-blue: #0041FF; --accent-yellow: #E4FF00; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.8); }
        body { background: radial-gradient(circle at top, #001a4d 0%, var(--bg-dark) 100%); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 700; font-size: 1.5rem; } .logo span { color: var(--accent-yellow); }
        .arena-container { padding: 50px 5%; max-width: 1200px; margin: 0 auto; }
        .arena-header { text-align: center; margin-bottom: 50px; }
        .arena-header h1 { font-size: clamp(2.5rem, 8vw, 4rem); color: var(--accent-yellow); text-transform: uppercase; letter-spacing: 5px; margin: 0; }
        .tour-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; }
        .tour-card { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; padding: 25px; position: relative; transition: 0.3s; overflow: hidden; backdrop-filter: blur(10px); }
        .tour-card:hover { border-color: var(--accent-yellow); transform: translateY(-5px); }
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 4px 12px; font-weight: 700; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase; }
        .badge-upcoming { background: var(--accent-blue); color: white; }
        .badge-live { background: var(--live-red); color: white; animation: blink 1s infinite; }
        .badge-ended { background: #444; color: #ccc; }
        @keyframes blink { 50% { opacity: 0.6; } }
        .tour-title { font-size: 1.8rem; margin: 10px 0; color: white; text-transform: uppercase; }
        .tour-meta { color: var(--neon-green); font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .join-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: var(--neon-green); color: black; text-decoration: none; padding: 15px; font-weight: 800; font-size: 1.2rem; border-radius: 8px; margin-bottom: 20px; transition: 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .info-box span { color: #888; font-size: 0.8rem; text-transform: uppercase; display: block; }
        .info-box strong { color: var(--accent-yellow); font-size: 1rem; }
        .footer-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .sec-btn { background: #1a1a1a; color: white; text-align: center; padding: 10px 5px; font-size: 0.7rem; font-weight: bold; border: 1px solid #333; border-radius: 4px; cursor: pointer; }
        .winner-display { background: rgba(255, 215, 0, 0.1); border: 1px solid gold; color: gold; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .roster-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .roster-modal { background: #0a0a0a; border: 1px solid var(--accent-blue); width: 95%; max-width: 600px; max-height: 85vh; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .roster-header { background: var(--accent-blue); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .roster-body { padding: 20px; overflow-y: auto; }
        .team-accordion { background: #151515; border: 1px solid #222; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
        .team-trigger { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: white; }
        .player-list { max-height: 0; overflow: hidden; transition: 0.3s ease-out; background: #000; }
        .player-item { padding: 10px 20px; border-bottom: 1px solid #111; color: #bbb; display: flex; align-items: center; gap: 10px; }
        @media (max-width: 600px) { .tour-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">NEXUS <span>LEGENDS</span></div>
        <a href="index.html" style="color:white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> HOME</a>
    </header>
    <div class="arena-container">
        <div class="arena-header"><h1>TOURNAMENT ARENA</h1><p style="color: #888;">JOIN THE ELITE | CLAIM YOUR GLORY</p></div>
        <div class="tour-grid" id="tour-display"><p style="text-align:center; width:100%;">Connecting Arena...</p></div>
    </div>

    <!-- MODALS -->
    <div id="rosterOverlay" class="roster-overlay"><div class="roster-modal"><div class="roster-header"><h2 id="modalTitle" style="margin:0; font-size:1.2rem;">Roster</h2><i class="fa-solid fa-xmark" onclick="closeModal('rosterOverlay')" style="cursor:pointer; font-size:1.5rem;"></i></div><div id="modalBody" class="roster-body"></div></div></div>
    <div id="fixtureOverlay" class="roster-overlay"><div class="roster-modal" style="border-color:var(--live-red);"><div class="roster-header" style="background:var(--live-red);"><h2 id="fixtureTitle" style="margin:0; font-size:1.2rem;">Fixtures</h2><i class="fa-solid fa-xmark" onclick="closeModal('fixtureOverlay')" style="cursor:pointer; font-size:1.5rem;"></i></div><div id="fixtureBody" class="roster-body"></div></div></div>
    <div id="standingsOverlay" class="roster-overlay"><div class="roster-modal" style="border-color:var(--accent-yellow);"><div class="roster-header" style="background:var(--accent-yellow); color:black;"><h2 id="standingsTitle" style="margin:0; font-size:1.2rem;">Standings</h2><i class="fa-solid fa-xmark" onclick="closeModal('standingsOverlay')" style="cursor:pointer; font-size:1.5rem;"></i></div><div id="standingsBody" class="roster-body"></div></div></div>

    <script>
        const API_URL = 'https://nl-server-k7i9.onrender.com/api/manage-tournament';
        let allToursData = [];

        async function loadTournaments() {
            try {
                const res = await fetch(API_URL);
                allToursData = await res.json();
                document.getElementById('tour-display').innerHTML = allToursData.map(t => {
                    let statusClass = t.status === 'Live' ? 'badge-live' : (t.status === 'Ended' ? 'badge-ended' : 'badge-upcoming');
                    return `
                        <div class="tour-card">
                            <div class="status-badge ${statusClass}">${t.status}</div>
                            <h2 class="tour-title">${t.title}</h2>
                            <div class="tour-meta"><i class="fa-solid fa-users"></i> ${t.totalTeams} Teams</div>
                            ${t.status === 'Ended' ? `<div class="winner-display">🏆 WINNER: ${t.winner || 'TBD'}</div>` : `<a href="${t.joinLink || '#'}" target="_blank" class="join-btn">JOIN NOW</a>`}
                            <div class="info-row"><div class="info-box"><span>Prize Pool</span><strong>${t.prize}</strong></div><div class="info-box"><span>Date</span><strong>${t.date}</strong></div></div>
                            <div class="footer-btns">
                                <button onclick="openFixture('${t._id}')" class="sec-btn"><i class="fa-solid fa-sitemap"></i> BRACKETS</button>
                                <button onclick="openStandings('${t._id}')" class="sec-btn"><i class="fa-solid fa-table-list"></i> POINTS</button>
                                <button onclick="openRoster('${t._id}')" class="sec-btn"><i class="fa-solid fa-list-ul"></i> ROSTER</button>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) { document.getElementById('tour-display').innerHTML = "Offline"; }
        }

        function openRoster(tourId) {
            const t = allToursData.find(x => x._id === tourId);
            document.getElementById('modalTitle').innerText = t.title + " Roster";
            document.getElementById('modalBody').innerHTML = (t.roster || []).map(team => `
                <div class="team-accordion"><div class="team-trigger" onclick="toggleAccordion(this)"><span><i class="fa-solid fa-shield-halved" style="color:var(--accent-yellow)"></i> ${team.teamName}</span><i class="fa-solid fa-chevron-down"></i></div>
                <div class="player-list">${team.players.map(p => `<div class="player-item"><i class="fa-solid fa-user-ninja"></i> ${p}</div>`).join('')}</div></div>`).join('');
            document.getElementById('rosterOverlay').style.display = 'flex';
        }

        function openStandings(tourId) {
            const t = allToursData.find(x => x._id === tourId);
            let stats = {};
            (t.roster || []).forEach(tm => stats[tm.teamName] = { name: tm.teamName, group: tm.groupName || "Group A", p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 });
            (t.fixtures || []).forEach(stg => stg.matches.forEach(m => {
                if(m.s1 !== "-" && m.s2 !== "-" && stats[m.p1] && stats[m.p2]){
                    let s1 = parseInt(m.s1), s2 = parseInt(m.s2);
                    stats[m.p1].p++; stats[m.p2].p++; stats[m.p1].gf += s1; stats[m.p1].ga += s2; stats[m.p2].gf += s2; stats[m.p2].ga += s1;
                    if(s1 > s2){ stats[m.p1].w++; stats[m.p1].pts += 3; stats[m.p2].l++; }
                    else if(s2 > s1){ stats[m.p2].w++; stats[m.p2].pts += 3; stats[m.p1].l++; }
                    else { stats[m.p1].d++; stats[m.p2].d++; stats[m.p1].pts += 1; stats[m.p2].pts += 1; }
                }
            }));
            const groups = {};
            Object.values(stats).forEach(s => { let g = t.tableType === "Normal" ? "Standings" : s.group; if(!groups[g]) groups[g]=[]; groups[g].push(s); });
            document.getElementById('standingsBody').innerHTML = Object.keys(groups).map(gName => {
                groups[gName].sort((a,b) => (b.pts - a.pts) || ((b.gf-b.ga)-(a.gf-a.ga)) || (b.gf-a.gf));
                return `<h3 style="color:var(--accent-yellow); font-size:0.9rem;">${gName}</h3>
                <table style="width:100%; text-align:center; font-size:0.7rem; border-collapse:collapse; margin-bottom:20px; background:#111;">
                <tr style="background:#222; color:#888;"><th>TEAM</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>PTS</th></tr>
                ${groups[gName].map((s,i) => `<tr><td style="text-align:left; padding:8px;">${i+1}. ${s.name}</td><td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td style="color:#0f8">${s.gf}</td><td style="color:#f44">${s.ga}</td><td>${s.gf-s.ga}</td><td style="color:var(--accent-yellow)">${s.pts}</td></tr>`).join('')}</table>`;
            }).join('');
            document.getElementById('standingsOverlay').style.display = 'flex';
        }

        function openFixture(tourId) {
            const t = allToursData.find(x => x._id === tourId);
            document.getElementById('fixtureBody').innerHTML = (t.fixtures || []).map(s => `
                <div style="margin-bottom:20px;"><div style="color:var(--live-red); font-weight:800; border-bottom:1px solid #333; margin-bottom:10px;">${s.stageName}</div>
                ${s.matches.map(m => `<div style="display:grid; grid-template-columns: 1fr 50px 1fr; align-items:center; background:#111; padding:8px; border-radius:5px; margin-bottom:5px; font-size:0.8rem;">
                <div style="text-align:right;">${m.p1}</div><div style="text-align:center; background:var(--live-red); border-radius:3px; margin:0 5px;">${m.s1}:${m.s2}</div><div>${m.p2}</div></div>`).join('')}</div>`).join('');
            document.getElementById('fixtureOverlay').style.display = 'flex';
        }

        function toggleAccordion(el) { let list = el.nextElementSibling; list.style.maxHeight = list.style.maxHeight ? null : list.scrollHeight + "px"; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onload = loadTournaments;
    </script>
</body>
</html>
