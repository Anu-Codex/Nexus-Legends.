<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Arena | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --live-red: #ff003c;
            --neon-green: #00ff88;
            --accent-blue: #0041FF;
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        body {
            background: radial-gradient(circle at top, #001a4d 0%, var(--bg-dark) 100%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .arena-container {
            padding: 50px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .arena-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .arena-header h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
        }

        /* Tournament Grid */
        .tour-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }

        /* Tournament Card Style */
        .tour-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            position: relative;
            transition: 0.3s;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .tour-card:hover {
            border-color: var(--accent-yellow);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Status Badges */
        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 4px 12px;
            font-weight: 700;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .badge-upcoming { background: var(--accent-blue); color: white; }
        .badge-live { background: var(--live-red); color: white; animation: blink 1s infinite; }
        .badge-ended { background: #444; color: #ccc; }

        @keyframes blink { 50% { opacity: 0.6; } }

        .tour-title {
            font-size: 1.8rem;
            margin: 10px 0;
            color: white;
            text-transform: uppercase;
        }

        .tour-meta {
            color: var(--neon-green);
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Main Join Action */
        .join-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--neon-green);
            color: black;
            text-decoration: none;
            padding: 15px;
            font-weight: 800;
            font-size: 1.2rem;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: 0.3s;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
        }

        .join-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        /* Info Grid inside card */
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .info-box span { color: #888; font-size: 0.8rem; text-transform: uppercase; display: block; }
        .info-box strong { color: var(--accent-yellow); font-size: 1rem; }

        /* Secondary Buttons */
        .footer-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .sec-btn {
            background: #1a1a1a;
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid #333;
            border-radius: 4px;
        }

        .sec-btn:hover { background: #333; }

        .winner-display {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid gold;
            color: gold;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .arena-container { padding: 30px 5%; }
            .tour-grid { grid-template-columns: 1fr; }
        }
        /* --- ROSTER MODAL STYLES --- */
.roster-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; z-index: 9999;
}

.roster-modal {
    background: #0a0a0a; border: 1px solid var(--nexus-blue);
    width: 90%; max-width: 500px; max-height: 80vh;
    border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 0 30px rgba(0, 65, 255, 0.3);
}

.roster-header {
    background: var(--nexus-blue); padding: 20px;
    display: flex; justify-content: space-between; align-items: center;
}

.roster-body { padding: 20px; overflow-y: auto; }

/* --- ACCORDION STYLES --- */
.team-accordion {
    background: #151515; border: 1px solid #222;
    margin-bottom: 10px; border-radius: 8px; overflow: hidden;
}

.team-trigger {
    padding: 15px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center;
    font-weight: bold; transition: 0.3s;
}

.team-trigger:hover { background: #222; color: var(--accent-yellow); }

.player-list {
    max-height: 0; overflow: hidden; transition: 0.3s ease-out;
    background: #000; font-size: 0.9rem;
}

.player-item {
    padding: 10px 20px; border-bottom: 1px solid #111;
    color: #bbb; display: flex; align-items: center; gap: 10px;
}

.player-item i { color: var(--nexus-blue); font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS <span>LEGENDS</span></div>
        <a href="index.html" style="color:white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> HOME</a>
    </header>

    <div class="arena-container">
        <div class="arena-header">
            <h1>TOURNAMENT ARENA</h1>
            <p style="color: #888; letter-spacing: 2px;">JOIN THE ELITE | CLAIM YOUR GLORY</p>
        </div>

        <div class="tour-grid" id="tour-display">
            <!-- Loading State -->
            <p style="text-align:center; width:100%;">Synchronizing with Arena Servers...</p>
        </div>
        <div id="rosterOverlay" class="roster-overlay">
    <div class="roster-modal">
        <div class="roster-header">
            <h2 id="modalTitle" style="margin:0; font-size:1.2rem; text-transform:uppercase;">Tournament Roster</h2>
            <i class="fa-solid fa-xmark" onclick="closeRoster()" style="cursor:pointer; font-size:1.5rem;"></i>
        </div>
        <div id="modalBody" class="roster-body">
            <!-- Teams will be injected here -->
        </div>
    </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://nl-server-k7i9.onrender.com/api/manage-tournament';

        async function loadTournaments() {
            try {
                const response = await fetch(API_URL);
                const tours = await response.json();
                const container = document.getElementById('tour-display');

                if (!tours || tours.length === 0) {
                    container.innerHTML = "<p>No active tournaments found.</p>";
                    return;
                }

                container.innerHTML = tours.map(t => {
                    // Logic for Status Colors
                    let statusClass = 'badge-upcoming';
                    if(t.status === 'Live') statusClass = 'badge-live';
                    if(t.status === 'Ended') statusClass = 'badge-ended';

                    return `
                        <div class="tour-card">
                            <div class="status-badge ${statusClass}">${t.status}</div>
                            
                            <h2 class="tour-title">${t.title || 'Unnamed Event'}</h2>
                            <div class="tour-meta">
                                <i class="fa-solid fa-users"></i> ${t.totalTeams || 'TBA'}
                            </div>

                            <!-- Show Winner if Ended, else show Join Button -->
                            ${t.status === 'Ended' ? `
                                <div class="winner-display">
                                    🏆 WINNER: ${t.winner || 'TBD'}
                                </div>
                            ` : `
                                <a href="${t.joinLink || '#'}" target="_blank" class="join-btn">
                                    <i class="fa-solid fa-right-to-bracket"></i> JOIN NOW
                                </a>
                            `}

                            <div class="info-row">
                                <div class="info-box">
                                    <span>Prize Pool</span>
                                    <strong>${t.prize || 'Trophy'}</strong>
                                </div>
                                <div class="info-box">
                                    <span>Event Date</span>
                                    <strong>${t.date || 'TBA'}</strong>
                                </div>
                            </div>

                            <div class="footer-btns">
                                <a href="${t.fixtureLink || '#'}" target="_blank" class="sec-btn">
                                    <i class="fa-solid fa-sitemap"></i> BRACKETS
                                </a>
                                <a href="${t.rosterLink || '#'}" target="_blank" class="sec-btn">
                                    <i class="fa-solid fa-list-ul"></i> ROSTER
                                </a>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                document.getElementById('tour-display').innerHTML = "<p>Arena Offline. Try again later.</p>";
            }
        }

        window.onload = loadTournaments;
    </script>
</body>
</html>
