<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Studio | eSports Media Suite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Using specific version for stability -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root { --accent: #E4FF00; --blue: #0041FF; }
        body { background: #050505; color: white; font-family: 'Rajdhani', sans-serif; margin: 0; }
        .studio-container { padding: 100px 5% 50px; max-width: 900px; margin: 0 auto; }
        .main-card { background: rgba(15,15,15,0.9); border: 1px solid #222; border-radius: 20px; padding: 30px; }
        .option-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .opt-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; font-family: inherit; margin-top: 5px; }
        .preview-area { margin: 20px 0; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid #222; display: none; }
        video { width: 100%; display: block; }
        .btn-render { width: 100%; background: var(--accent); color: black; border: none; padding: 18px; font-weight: 800; border-radius: 10px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
        .btn-render:disabled { opacity: 0.3; cursor: not-allowed; }
        .loading-zone { margin-top: 20px; display: none; }
        .bar-bg { width: 100%; height: 8px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .bar-fill { width: 0%; height: 100%; background: var(--blue); transition: 0.3s; }
    </style>
</head>
<body>

    <header style="display:flex; justify-content:space-between; align-items:center; padding: 15px 5%; background:rgba(0,0,0,0.9); position:fixed; top:0; width:100%; z-index:100; border-bottom: 1px solid #222;">
        <div class="logo">NEXUS <span>STUDIO</span></div>
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;"><i class="fa-solid fa-arrow-left"></i> BACK</a>
    </header>

    <div class="studio-container">
        <div class="main-card">
            <h2 style="margin:0 0 20px; text-align:center;">PRO <span style="color:var(--accent)">CLIP EDITOR</span></h2>

            <div id="uploadBox" style="border: 2px dashed #333; padding: 40px; text-align: center; border-radius: 15px; cursor: pointer;" onclick="document.getElementById('vidIn').click()">
                <i class="fa-solid fa-film" style="font-size:3rem; color:#444; margin-bottom:15px;"></i>
                <p>SELECT MATCH CLIP (MP4)</p>
                <input type="file" id="vidIn" hidden accept="video/mp4">
            </div>

            <div id="editorUI" style="display:none; margin-top:30px;">
                <div class="preview-area" id="pArea"><video id="vPreview" controls></video></div>

                <div class="option-grid">
                    <div class="opt-box"><b>TRIM (SECONDS)</b>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input type="number" id="start" value="0">
                            <input type="number" id="duration" value="10">
                        </div>
                    </div>
                    <div class="opt-box"><b>WATERMARK</b>
                        <select id="watermark">
                            <option value="none">None</option>
                            <option value="text">"Nexus Legends" Text</option>
                        </select>
                    </div>
                    <div class="opt-box"><b>AUDIO</b>
                        <select id="audioOpt">
                            <option value="keep">Keep Sound</option>
                            <option value="mute">Mute</option>
                        </select>
                    </div>
                </div>

                <div class="loading-zone" id="loader">
                    <div style="font-size:0.8rem; color:var(--accent); text-align:center;" id="status">Ready...</div>
                    <div class="bar-bg"><div class="bar-fill" id="fill"></div></div>
                </div>

                <button class="btn-render" id="renderBtn" onclick="renderVideo()">RENDER CLIP</button>

                <div id="resultBox" style="display:none; text-align:center; margin-top:20px; padding:20px; background:rgba(0,255,136,0.1); border:1px solid #00ff88; border-radius:10px;">
                    <a id="downloadBtn" href="#" download="nexus_clip.mp4" style="background:#00ff88; color:black; padding:10px 20px; text-decoration:none; border-radius:5px; font-weight:bold;">DOWNLOAD FINAL CLIP</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        // Pointing explicitly to the core for cross-origin stability
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        const vidIn = document.getElementById('vidIn');
        const vPreview = document.getElementById('vPreview');
        const renderBtn = document.getElementById('renderBtn');

        vidIn.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            vPreview.src = URL.createObjectURL(file);
            document.getElementById('uploadBox').style.display = 'none';
            document.getElementById('editorUI').style.display = 'block';
            document.getElementById('pArea').style.display = 'block';
        });

        async function renderVideo() {
            const file = vidIn.files[0];
            if(!file) return;

            renderBtn.disabled = true;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';

            try {
                if (!ffmpeg.isLoaded()) {
                    document.getElementById('status').innerText = "Loading Engine...";
                    await ffmpeg.load();
                }

                // Cleanup old files from memory
                try { ffmpeg.FS('unlink', 'src.mp4'); ffmpeg.FS('unlink', 'out.mp4'); } catch(e){}

                document.getElementById('status').innerText = "Reading File...";
                ffmpeg.FS('writeFile', 'src.mp4', await fetchFile(file));

                const ss = document.getElementById('start').value;
                const t = document.getElementById('duration').value;
                const audio = document.getElementById('audioOpt').value;
                const wm = document.getElementById('watermark').value;

                ffmpeg.setProgress(({ ratio }) => {
                    document.getElementById('fill').style.width = (ratio * 100) + "%";
                    document.getElementById('status').innerText = `Rendering: ${Math.round(ratio * 100)}%`;
                });

                // SIMPLE COMMAND FOR SPEED
                let args = ['-ss', ss, '-i', 'src.mp4', '-t', t];

                if(wm === 'text') {
                    args.push('-vf', "drawtext=text='NEXUS LEGENDS':x=w-tw-20:y=20:fontsize=24:fontcolor=white:box=1:boxcolor=black@0.5");
                }
                
                if(audio === 'mute') args.push('-an');

                // FASTEST PRESET TO PREVENT TIMEOUTS
                args.push('-preset', 'ultrafast', '-c:v', 'libx264', 'out.mp4');

                await ffmpeg.run(...args);

                const data = ffmpeg.FS('readFile', 'out.mp4');
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                document.getElementById('downloadBtn').href = url;
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('status').innerText = "Done!";
            } catch (err) {
                console.error(err);
                alert("Render failed. Make sure your video is an MP4 and not too large.");
            } finally {
                renderBtn.disabled = false;
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
