<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusBet | Professional Sportsbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #1a232e;
            --bg-secondary: #212d3b;
            --accent-blue: #2196f3;
            --accent-green: #4caf50;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --odds-bg: #2d3d50;
            --1xbet-blue: #126da0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- PROFESSIONAL HEADER --- */
        header {
            background: var(--bg-secondary);
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--1xbet-blue);
            z-index: 100;
        }

        .brand { font-size: 1.5rem; font-weight: 900; color: white; display: flex; align-items: center; gap: 10px; }
        .brand span { color: var(--accent-blue); }

        .user-controls { display: flex; gap: 15px; align-items: center; }
        .balance-box { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 4px; border-left: 3px solid var(--accent-green); }
        .balance-box small { color: var(--text-dim); font-size: 0.7rem; display: block; }
        .balance-box b { font-size: 1rem; color: #fff; }

        /* --- MAIN LAYOUT --- */
        .main-layout {
            display: grid;
            grid-template-columns: 240px 1fr 320px;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT SIDEBAR */
        .sidebar { background: var(--bg-secondary); border-right: 1px solid #2d3d50; overflow-y: auto; padding: 10px; }
        .sidebar-item { 
            padding: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 10px; 
            border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .sidebar-item:hover { background: #2d3d50; color: white; }
        .sidebar-item.active { background: var(--1xbet-blue); color: white; }

        /* MIDDLE CONTENT (THE LINE) */
        .content { overflow-y: auto; padding: 15px; background: #0f171e; }
        .section-header { 
            background: var(--bg-secondary); padding: 10px 15px; border-radius: 4px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }

        /* MATCH ROWS (1xBet Style) */
        .match-row {
            background: var(--bg-secondary);
            margin-bottom: 2px;
            display: grid;
            grid-template-columns: 1fr 300px;
            padding: 10px 15px;
            align-items: center;
            border-radius: 2px;
            transition: 0.2s;
        }
        .match-row:hover { background: #2d3d50; }
        .match-info { display: flex; flex-direction: column; gap: 5px; }
        .match-teams { font-weight: 500; font-size: 0.95rem; }
        .match-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; gap: 10px; }

        .odds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .odd-box {
            background: var(--odds-bg); border: none; color: white; padding: 8px;
            border-radius: 4px; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; font-size: 0.85rem; transition: 0.2s;
        }
        .odd-box:hover { background: var(--accent-blue); }
        .odd-box span { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 2px; }
        .odd-box b { color: var(--accent-green); }

        /* RIGHT SIDEBAR (BET SLIP) */
        .bet-slip { background: var(--bg-secondary); border-left: 1px solid #2d3d50; display: flex; flex-direction: column; }
        .slip-header { background: #2d3d50; padding: 15px; font-weight: 700; text-align: center; text-transform: uppercase; }
        .slip-content { flex: 1; padding: 15px; overflow-y: auto; }
        .empty-slip { text-align: center; color: var(--text-dim); margin-top: 50px; font-size: 0.9rem; }
        
        .slip-item {
            background: #1a232e; padding: 10px; border-radius: 4px; margin-bottom: 10px;
            border-left: 4px solid var(--accent-blue); position: relative;
        }
        .slip-item .remove { position: absolute; top: 5px; right: 8px; color: #ff4444; cursor: pointer; }
        .slip-footer { background: #2d3d50; padding: 20px; }
        .input-group { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .stake-input { background: #000; border: 1px solid #444; color: white; padding: 8px; width: 100px; text-align: right; border-radius: 4px; }
        
        .place-bet-btn {
            width: 100%; background: var(--accent-green); color: white; border: none;
            padding: 12px; border-radius: 4px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* MODALS (Simplified for brevity) */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar, .bet-slip { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">NEXUS<span>BET</span></div>
        <div class="user-controls">
            <div class="balance-box">
                <small>ACCOUNT BALANCE</small>
                <b id="balanceDisplay">₦ 0.00</b>
            </div>
            <button onclick="logout()" id="logoutBtn" style="background:transparent; border:1px solid #444; color:white; padding:5px 10px; border-radius:4px; cursor:pointer;">Logout</button>
        </div>
    </header>

    <div class="main-layout">
        <!-- LEFT: NAVIGATION -->
        <div class="sidebar">
            <div class="sidebar-item active"><i class="fa-solid fa-soccer-ball"></i> Football</div>
            <div class="sidebar-item"><i class="fa-solid fa-basketball"></i> Basketball</div>
            <div class="sidebar-item"><i class="fa-solid fa-tennis-ball"></i> Tennis</div>
            <div class="sidebar-item"><i class="fa-solid fa-gamepad"></i> eSports</div>
            <hr style="border:0; border-top:1px solid #2d3d50; margin: 15px 0;">
            <div class="sidebar-item" onclick="claimDaily()"><i class="fa-solid fa-gift" style="color:var(--accent-green)"></i> Daily Bonus</div>
        </div>

        <!-- MIDDLE: THE LINE -->
        <div class="content">
            <div class="section-header">
                <span style="font-weight:700;">TOP FOOTBALL MATCHES</span>
                <span style="color:var(--accent-blue); font-size:0.8rem; cursor:pointer;">View All ></span>
            </div>
            
            <div id="match-list">
                <!-- Matches injected here -->
                <div style="padding:50px; text-align:center; color:var(--text-dim);">Loading Live Markets...</div>
            </div>
        </div>

        <!-- RIGHT: BET SLIP -->
        <div class="bet-slip">
            <div class="slip-header">Bet Slip</div>
            <div class="slip-content" id="slipContent">
                <div class="empty-slip">Your slip is empty.<br>Click on an odd to add a bet.</div>
            </div>
            <div class="slip-footer" id="slipFooter" style="display:none;">
                <div class="input-group">
                    <span>Stake:</span>
                    <input type="number" id="stakeAmount" class="stake-input" value="1000" oninput="calculateReturns()">
                </div>
                <div class="input-group">
                    <span>Potential Win:</span>
                    <b id="potentialReturn" style="color:var(--accent-green)">₦ 0.00</b>
                </div>
                <button class="place-bet-btn" onclick="submitBet()">Place Bet</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://nl-server-k7i9.onrender.com/api';
        let currentUser = JSON.parse(localStorage.getItem('nexus_user') || 'null');
        let currentSlip = null; // Professional sportsbook usually handles one selection at a time or multi-bet

        // 1. DATA LOADING
        async function loadMarkets() {
            try {
                const res = await fetch(`${API}/predictions`);
                const data = await res.json();
                const container = document.getElementById('match-list');

                container.innerHTML = data.map(m => `
                    <div class="match-row">
                        <div class="match-info">
                            <div class="match-teams">${m.p1} vs ${m.p2}</div>
                            <div class="match-meta">
                                <span style="color:#ff4444">● LIVE</span>
                                <span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                <span>ID: ${m.matchId}</span>
                            </div>
                        </div>
                        <div class="odds-grid">
                            <button class="odd-box" onclick="addToSlip('${m.matchId}', '${m.p1}', 'p1', ${m.oddsP1})">
                                <span>1</span><b>${m.oddsP1.toFixed(2)}</b>
                            </button>
                            <button class="odd-box" onclick="addToSlip('${m.matchId}', 'Draw', 'draw', ${m.oddsDraw})">
                                <span>X</span><b>${m.oddsDraw.toFixed(2)}</b>
                            </button>
                            <button class="odd-box" onclick="addToSlip('${m.matchId}', '${m.p2}', 'p2', ${m.oddsP2})">
                                <span>2</span><b>${m.oddsP2.toFixed(2)}</b>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        // 2. SLIP LOGIC
        function addToSlip(matchId, teamName, pick, odds) {
            currentSlip = { matchId, teamName, pick, odds };
            renderSlip();
        }

        function renderSlip() {
            const content = document.getElementById('slipContent');
            const footer = document.getElementById('slipFooter');
            
            if(!currentSlip) {
                content.innerHTML = `<div class="empty-slip">Your slip is empty.</div>`;
                footer.style.display = 'none';
                return;
            }

            content.innerHTML = `
                <div class="slip-item">
                    <span class="remove" onclick="clearSlip()">&times;</span>
                    <div style="font-size:0.75rem; color:var(--text-dim); margin-bottom:5px;">Match ID: ${currentSlip.matchId}</div>
                    <div style="font-weight:700;">${currentSlip.teamName}</div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px;">
                        <span>Odd:</span>
                        <b style="color:var(--accent-blue)">${currentSlip.odds.toFixed(2)}</b>
                    </div>
                </div>
            `;
            footer.style.display = 'block';
            calculateReturns();
        }

        function calculateReturns() {
            const stake = document.getElementById('stakeAmount').value;
            const returns = stake * (currentSlip ? currentSlip.odds : 0);
            document.getElementById('potentialReturn').innerText = `₦ ${returns.toLocaleString()}`;
        }

        function clearSlip() {
            currentSlip = null;
            renderSlip();
        }

        // 3. AUTH & ACTION
        async function submitBet() {
            if(!currentUser) return alert("Please Sign In first!");
            const stake = document.getElementById('stakeAmount').value;
            
            try {
                const res = await fetch(`${API}/bets/place`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        userId: currentUser._id, 
                        matchId: currentSlip.matchId, 
                        pick: currentSlip.pick, 
                        slips: stake / 100, // Adjusting based on your backend logic
                        multiplier: currentSlip.odds 
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    alert("✅ Bet Placed Successfully!");
                    currentUser.balance = data.newBalance;
                    localStorage.setItem('nexus_user', JSON.stringify(currentUser));
                    updateHeader();
                    clearSlip();
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch(e) { alert("Server connection failed."); }
        }

        function updateHeader() {
            if(currentUser) {
                document.getElementById('balanceDisplay').innerText = `₦ ${Number(currentUser.balance).toLocaleString()}`;
            }
        }

        function logout() {
            localStorage.removeItem('nexus_user');
            location.href = "login.html"; // Assuming you have a separate login
        }

        // INIT
        window.onload = () => {
            updateHeader();
            loadMarkets();
        };
    </script>
</body>
</html>
