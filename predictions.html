<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus 1Bet | Professional Sportsbook</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 1XBET PROFESSIONAL THEME */
        :root { 
            --xb-blue: #12305e; 
            --xb-light-blue: #1b4d8d; 
            --xb-green: #2fb344; 
            --xb-yellow: #f8e71c; 
            --dark-bg: #0b1624;
        }
        body { background: var(--dark-bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding-top: 110px; }
        
        header { 
            background: var(--xb-blue); border-bottom: 2px solid var(--xb-light-blue);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;
        }
        
        .user-dashboard {
            position: fixed; top: 52px; width: 100%; z-index: 999;
            background: #162535; border-bottom: 1px solid #253949;
            padding: 8px 5%; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }

        .nexus-currency { color: var(--xb-yellow); font-weight: 900; font-size: 1.1rem; }

        /* Match Cards */
        .pred-card {
            background: #1c2c3d; border-radius: 10px; margin-bottom: 15px; 
            border: 1px solid #2d3e50; position: relative; overflow: hidden;
        }
        .match-header { background: #253949; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 0.7rem; color: #8fa3b3; }
        .match-body { padding: 20px 15px; display: grid; grid-template-columns: 1fr 40px 1fr; align-items: center; text-align: center; }
        
        .team-name { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .odds-val { display: block; color: var(--xb-green); font-size: 0.9rem; margin-top: 5px; font-weight: bold; }
        
        .vs-box { background: #0b1624; padding: 5px; border-radius: 5px; color: #4e6376; font-weight: 900; font-size: 0.7rem; }

        /* Betting Buttons */
        .bet-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #253949; }
        .xb-btn { 
            background: transparent; border: none; color: white; padding: 15px 5px; 
            font-family: inherit; font-weight: 700; cursor: pointer; transition: 0.2s;
            border-right: 1px solid #253949; font-size: 0.8rem;
        }
        .xb-btn:last-child { border-right: none; }
        .xb-btn:hover { background: var(--xb-light-blue); }
        .xb-btn:active { background: var(--xb-green); color: white; }

        .auth-trigger { background: var(--xb-green); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: 800; cursor: pointer; }
        
        /* Modal remains standard but color-updated */
        .roster-modal { border-color: var(--xb-green) !important; background: #0b1624 !important; }
        .join-btn { background: var(--xb-green) !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS <span>1BET</span></div>
        <a href="index.html" style="color:#8fa3b3; text-decoration:none; font-size:0.8rem; font-weight:bold;">HOME</a>
    </header>

    <div class="user-dashboard">
        <div class="user-meta">
            <div id="balanceDisplay" class="nexus-currency">🪙 0</div>
            <div id="userInfo" style="font-size:0.6rem; color:#4e6376;">GUEST PLAYER</div>
        </div>
        <div class="action-tray" style="display:flex; gap:10px;">
            <button id="dailyBtn" onclick="claimDaily()" class="auth-trigger" style="background:#1b4d8d; display:none;">BONUS</button>
            <button onclick="toggleAuthModal()" id="loginBtn" class="auth-trigger">SIGN IN</button>
        </div>
    </div>

    <div class="pred-container">
        <div id="prediction-list">
            <p style="text-align:center; color:#4e6376; margin-top:50px;">LOADING LIVE MARKETS...</p>
        </div>
    </div>

    <!-- AUTH MODAL (Copy from your previous file) -->
    <div id="authOverlay" class="roster-overlay"> ... </div>

    <script>
        const API = 'https://nl-server-k7i9.onrender.com/api';
        let currentUser = JSON.parse(localStorage.getItem('nexus_user'));

        function updateUI() {
            if(currentUser) {
                document.getElementById('userInfo').innerText = currentUser.username.toUpperCase();
                document.getElementById('balanceDisplay').innerText = `🪙 ${Number(currentUser.balance).toLocaleString()}`;
                document.getElementById('loginBtn').innerText = "LOGOUT";
                document.getElementById('loginBtn').onclick = () => { localStorage.clear(); location.reload(); };
                document.getElementById('dailyBtn').style.display = "block";
            }
        }

        async function loadPredictions() {
            try {
                const res = await fetch(`${API}/predictions`);
                const data = await res.json();
                const container = document.getElementById('prediction-list');

                container.innerHTML = data.map(p => `
                    <div class="pred-card">
                        <div class="match-header">
                            <span>● LIVE NOW</span>
                            <span>MATCH ID: ${p.matchId.slice(-6).toUpperCase()}</span>
                        </div>
                        <div class="match-body">
                            <div class="team-name">${p.p1} <span class="odds-val">${p.oddsP1}</span></div>
                            <div class="vs-box">VS</div>
                            <div class="team-name">${p.p2} <span class="odds-val">${p.oddsP2}</span></div>
                        </div>
                        <div class="bet-row">
                            <button onclick="buySlip('${p.matchId}', 'p1', ${p.oddsP1})" class="xb-btn">1</button>
                            <button onclick="buySlip('${p.matchId}', 'draw', ${p.oddsDraw})" class="xb-btn">X</button>
                            <button onclick="buySlip('${p.matchId}', 'p2', ${p.oddsP2})" class="xb-btn">2</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error("Sync Error"); }
        }

        async function buySlip(matchId, pick, multiplier) {
            // GUEST PROTECTION
            if(!currentUser) return toggleAuthModal();

            if(!confirm(`Confirm bet on ${pick.toUpperCase()} at ${multiplier}x? 🪙100 will be deducted.`)) return;

            try {
                const res = await fetch(`${API}/bets/place`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: currentUser._id, matchId, pick, slips: 1, multiplier })
                });
                const data = await res.json();
                if(res.ok) {
                    currentUser.balance = data.newBalance;
                    localStorage.setItem('nexus_user', JSON.stringify(currentUser));
                    updateUI();
                    alert("✓ BET PLACED! Receipt sent to your email.");
                } else alert(data.error);
            } catch(e) { alert("Server Error"); }
        }

        // Add requestOTP, verifyOTP, toggleAuthModal functions here...
        
        window.onload = () => { updateUI(); loadPredictions(); };
    </script>
</body>
</html>
