<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Center | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --nexus-orange: #ff8800; --nexus-blue: #0041FF; }
        body { background: radial-gradient(circle at top, #1a0f00 0%, #050505 100%); color: white; font-family: 'Rajdhani', sans-serif; }
        .pred-container { padding: 100px 5% 50px; max-width: 800px; margin: 0 auto; }
        
        .pred-card {
            background: rgba(20,20,20,0.8); border: 1px solid #333; border-radius: 20px;
            padding: 25px; margin-bottom: 25px; backdrop-filter: blur(10px);
            position: relative; overflow: hidden;
        }

        .vs-badge { background: var(--nexus-orange); color: black; font-weight: 900; padding: 5px 12px; border-radius: 4px; font-size: 0.8rem; }

        /* Hype Meter */
        .hype-bar { width: 100%; height: 12px; background: #111; border-radius: 20px; display: flex; overflow: hidden; margin: 20px 0; border: 1px solid #222; }
        .hype-p1 { height: 100%; background: var(--nexus-blue); transition: 0.5s; }
        .hype-draw { height: 100%; background: #444; transition: 0.5s; }
        .hype-p2 { height: 100%; background: var(--nexus-orange); transition: 0.5s; }

        .vote-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .v-btn { 
            background: #111; border: 1px solid #333; color: white; padding: 12px; 
            border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s;
            font-family: inherit; font-size: 0.8rem;
        }
        .v-btn:hover:not(:disabled) { border-color: var(--nexus-orange); background: #1a1a1a; }
        .v-btn.voted { background: var(--nexus-orange); color: black; border-color: var(--nexus-orange); }
        .v-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .perc-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .nexus-currency { color: #E4FF00; font-weight: 900; }
.slip-badge { background: #ff8800; color: black; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
.user-bar { background: rgba(0,0,0,0.8); padding: 10px 5%; display: flex; justify-content: space-between; position: sticky; top: 70px; z-index: 99; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <header style="display:flex; justify-content:space-between; align-items:center; padding:15px 5%; background:rgba(0,0,0,0.9); position:fixed; top:0; width:100%; z-index:100; border-bottom:1px solid #222;">
        <div class="logo">NEXUS <span>PREDICTS</span></div>
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;"><i class="fa-solid fa-arrow-left"></i> BACK</a>
        <div id="authSection" class="user-bar">
    <div id="userInfo">Welcome, Guest Strikers</div>
    <div id="balanceDisplay" class="nexus-currency">₦ 0</div>
    <button onclick="toggleAuthModal()" id="loginBtn" class="sec-btn" style="padding:5px 15px;">SIGN IN</button>
</div>

<!-- SIGNUP MODAL -->
<div id="authOverlay" class="roster-overlay">
    <div class="roster-modal" style="max-width:350px; border-color:var(--nexus-yellow);">
        <div class="roster-header" style="background:var(--nexus-yellow); color:black;">
            <h2 id="authTitle">ARENA REGISTRATION</h2>
            <i class="fa-solid fa-xmark" onclick="toggleAuthModal()"></i>
        </div>
        <div class="roster-body">
            <input type="text" id="authUser" placeholder="Username">
            <input type="password" id="authPass" placeholder="Password">
            <button onclick="handleAuth('signup')" class="join-btn">CREATE & GET ₦10,000</button>
            <p style="text-align:center; font-size:0.8rem; margin:10px 0;">OR</p>
            <button onclick="handleAuth('login')" class="btn-outline" style="width:100%; border-radius:8px; padding:10px;">SIGN IN TO ACCOUNT</button>
        </div>
    </div>
</div>
    </header>

    <div class="pred-container">
        <h1 style="text-align:center; text-transform:uppercase; letter-spacing:4px; margin-bottom:40px;">Community <span style="color:var(--nexus-orange)">Hype Board</span></h1>
        
        <div id="prediction-list">
            <p style="text-align:center; color:#555;">Scanning Arena for Active Matchups...</p>
        </div>
    </div>

    <script>
        const API = 'https://nl-server-k7i9.onrender.com/api';

        async function loadPredictions() {
            try {
                const res = await fetch(`${API}/predictions`);
                const data = await res.json();
                const container = document.getElementById('prediction-list');

                if(data.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:#444;'>No active predictions. Check back during tournament hours!</p>";
                    return;
                }

                // Replace your loadPredictions loop with this logic:
                container.innerHTML = data.map(p => `
    <div class="pred-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b>${p.p1}</b> <span class="vs-badge">${p.oddsP1}x</span>
            <span style="color:#444">vs</span>
            <span class="vs-badge">${p.oddsP2}x</span> <b>${p.p2}</b>
        </div>
        <div class="vote-btns">
            <button onclick="buySlip('${p._id}', 'p1', ${p.oddsP1})" class="v-btn">BET P1 (100₦)</button>
            <button onclick="buySlip('${p._id}', 'draw', ${p.oddsDraw})" class="v-btn">BET DRAW (100₦)</button>
            <button onclick="buySlip('${p._id}', 'p2', ${p.oddsP2})" class="v-btn">BET P2 (100₦)</button>
        </div>
    </div>
`).join('');
                let currentUser = JSON.parse(localStorage.getItem('nexus_user'));

function updateUI() {
    if(currentUser) {
        document.getElementById('userInfo').innerText = currentUser.username;
        document.getElementById('balanceDisplay').innerText = `₦ ${currentUser.balance.toLocaleString()}`;
        document.getElementById('loginBtn').innerText = "LOGOUT";
        document.getElementById('loginBtn').onclick = () => { localStorage.clear(); location.reload(); };
    }
}

async function handleAuth(type) {
    const username = document.getElementById('authUser').value;
    const password = document.getElementById('authPass').value;
    const res = await fetch(`${API}/auth/${type}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(res.ok) {
        localStorage.setItem('nexus_user', JSON.stringify(data.user));
        location.reload();
    } else alert(data.error);
}

async function buySlip(matchId, pick, multiplier) {
    if(!currentUser) return toggleAuthModal();
    
    const res = await fetch(`${API}/bets/place`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: currentUser._id, matchId, pick, slips: 1, multiplier })
    });
    const data = await res.json();
    if(res.ok) {
        currentUser.balance = data.newBalance;
        localStorage.setItem('nexus_user', JSON.stringify(currentUser));
        updateUI();
        alert("✓ Slip Purchased! 100₦ Deducted.");
    } else alert(data.error);
}

                    

        async function castVote(predId, pick) {
            const res = await fetch(`${API}/predictions/vote`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ predId, pick })
            });
            if(res.ok) {
                localStorage.setItem(`voted_${predId}`, pick);
                loadPredictions(); // Lightning fast refresh
            }
        }

        window.onload = loadPredictions;
    </script>
</body>
</html>
