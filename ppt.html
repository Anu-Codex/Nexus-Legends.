<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Center | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --nexus-orange: #ff8800; --nexus-blue: #0041FF; --nexus-yellow: #E4FF00; }
        body { background: radial-gradient(circle at top, #1a0f00 0%, #050505 100%); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding-top: 130px; }
        
        /* --- USER BAR --- */
        .user-bar { 
            background: rgba(0,0,0,0.9); padding: 10px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 60px; width: 100%; z-index: 99; 
            border-bottom: 1px solid #222; box-sizing: border-box;
            backdrop-filter: blur(10px);
        }
        .nexus-currency { color: var(--nexus-yellow); font-weight: 900; font-size: 1.2rem; }

        header { 
            display:flex; justify-content:space-between; align-items:center; 
            padding:15px 5%; background:rgba(0,0,0,1); 
            position:fixed; top:0; width:100%; z-index:100; 
            border-bottom:1px solid #222; box-sizing: border-box;
        }

        .pred-container { padding: 20px 5%; max-width: 800px; margin: 0 auto; }
        
        .pred-card {
            background: rgba(20,20,20,0.8); border: 1px solid #333; border-radius: 20px;
            padding: 25px; margin-bottom: 25px; backdrop-filter: blur(10px);
            position: relative; overflow: hidden;
        }

        .vs-badge { background: var(--nexus-orange); color: black; font-weight: 900; padding: 5px 12px; border-radius: 4px; font-size: 0.8rem; }

        .vote-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .v-btn { 
            background: #111; border: 1px solid #333; color: white; padding: 12px; 
            border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s;
            font-family: inherit; font-size: 0.7rem; text-transform: uppercase;
        }
        .v-btn:hover { border-color: var(--nexus-orange); background: #1a1a1a; }

        /* --- MODAL SYSTEM --- */
        .roster-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .roster-modal {
            background: #0a0a0a; border: 1px solid var(--nexus-yellow);
            width: 90%; max-width: 350px; border-radius: 20px; overflow: hidden;
        }
        .roster-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .roster-body { padding: 20px; }
        .roster-body input { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            background: #000; border: 1px solid #333; color: white; 
            border-radius: 8px; font-family: inherit; box-sizing: border-box;
        }

        .join-btn { 
            width: 100%; background: var(--nexus-yellow); color: black; 
            border: none; padding: 12px; font-weight: 800; border-radius: 8px; cursor: pointer;
        }
        .sec-btn { background: #1a1a1a; color: white; border: 1px solid #333; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS <span>PREDICTS</span></div>
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;"><i class="fa-solid fa-arrow-left"></i> BACK</a>
    </header>

    <div id="authSection" class="user-bar">
        <div id="userInfo" style="font-weight:bold; color:#888;">Welcome, Guest Striker</div>
        <div id="balanceDisplay" class="nexus-currency">₦ 0</div>
        <button onclick="toggleAuthModal()" id="loginBtn" class="sec-btn" style="padding:5px 15px;">SIGN IN</button>
    </div>

    <!-- SIGNUP/LOGIN MODAL -->
    <div id="authOverlay" class="roster-overlay">
        <div class="roster-modal">
            <div class="roster-header" style="background:var(--nexus-yellow); color:black;">
                <h2 style="margin:0; font-size:1.1rem;">ARENA AUTHENTICATION</h2>
                <i class="fa-solid fa-xmark" onclick="toggleAuthModal()" style="cursor:pointer;"></i>
            </div>
            <div class="roster-body" id="otpStep1">
    <p style="font-size:0.8rem; color:#888; margin-bottom:15px;">Enter your email to receive an access code.</p>
    <input type="email" id="authEmail" placeholder="Email Address">
    <button onclick="requestOTP()" id="otpBtn" class="join-btn">SEND OTP</button>
</div>

<div class="roster-body" id="otpStep2" style="display:none;">
    <p style="font-size:0.8rem; color:#888; margin-bottom:15px;">Enter the 6-digit code sent to your email.</p>
    <input type="number" id="otpCode" placeholder="000000" style="text-align:center; letter-spacing:10px; font-size:1.5rem;">
    <button onclick="verifyOTP()" id="verifyBtn" class="join-btn">VERIFY & ENTER ARENA</button>
    <button onclick="location.reload()" style="background:none; border:none; color:#555; width:100%; margin-top:10px;">Change Email</button>
</div>
        </div>
    </div>

    <div class="pred-container">
        <h1 style="text-align:center; text-transform:uppercase; letter-spacing:4px; margin-bottom:40px;">Community <span style="color:var(--nexus-orange)">Hype Board</span></h1>
        <div id="prediction-list">
            <p style="text-align:center; color:#555;">Scanning Arena for Active Matchups...</p>
        </div>
    </div>

    <script>
        const API = 'https://nl-server-k7i9.onrender.com/api';
        let currentUser = JSON.parse(localStorage.getItem('nexus_user'));

        function toggleAuthModal() {
            const modal = document.getElementById('authOverlay');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function updateUI() {
            if(currentUser) {
                document.getElementById('userInfo').innerText = currentUser.username.toUpperCase();
                document.getElementById('balanceDisplay').innerText = `₦ ${currentUser.balance.toLocaleString()}`;
                document.getElementById('loginBtn').innerText = "LOGOUT";
                document.getElementById('loginBtn').onclick = () => { localStorage.clear(); location.reload(); };
            }
        }

        async function handleAuth(type) {
            const username = document.getElementById('authUser').value;
            const password = document.getElementById('authPass').value;
            if(!username || !password) return alert("Fill all fields");

            try {
                const res = await fetch(`${API}/auth/${type}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('nexus_user', JSON.stringify(data.user));
                    location.reload();
                } else alert(data.error);
            } catch(e) { alert("Server Connection Failed"); }
        }
        async function loadPredictions() {
    try {
        const res = await fetch(`${API}/predictions`);
        const data = await res.json();
        const container = document.getElementById('prediction-list');

        if(data.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#555;'>No active matchups found in database.</p>";
            return;
        }

        // Fetch user bets to show slip count (Safety check for guest)
        let userBets = [];
        if(currentUser) {
            const betRes = await fetch(`${API}/user-bets-all/${currentUser._id}`);
            userBets = await betRes.json();
        }

        container.innerHTML = data.map(p => {
            // "Closed" or "LOCKED" makes buttons red and disabled
            const isLocked = (p.status === "Closed" || p.status === "LOCKED");
            const mySlips = userBets.filter(b => b.matchId === p.matchId).length;

            return `
                <div class="pred-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span style="color:${isLocked ? '#ff4444' : '#00ff88'}; font-weight:bold; font-size:0.7rem;">
                            ● ${p.status.toUpperCase()}
                        </span>
                        ${mySlips > 0 ? `<span class="slip-badge">${mySlips} SLIPS BOUGHT</span>` : ''}
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <div style="text-align:center;"><b style="display:block;">${p.p1}</b><small style="color:var(--nexus-orange)">${p.oddsP1}x</small></div>
                        <span class="vs-badge">VS</span>
                        <div style="text-align:center;"><b style="display:block;">${p.p2}</b><small style="color:var(--nexus-orange)">${p.oddsP2}x</small></div>
                    </div>

                    <div class="vote-btns">
                        <button onclick="buySlip('${p.matchId}', 'p1', ${p.oddsP1})" class="v-btn" ${isLocked ? 'disabled' : ''}>BET ${p.p1}</button>
                        <button onclick="buySlip('${p.matchId}', 'draw', ${p.oddsDraw})" class="v-btn" ${isLocked ? 'disabled' : ''}>DRAW</button>
                        <button onclick="buySlip('${p.matchId}', 'p2', ${p.oddsP2})" class="v-btn" ${isLocked ? 'disabled' : ''}>BET ${p.p2}</button>
                    </div>

                    ${mySlips > 0 && !isLocked ? `
                        <button onclick="withdrawBet('${p.matchId}')" style="width:100%; margin-top:10px; background:none; border:1px solid #444; color:#666; font-size:0.7rem; padding:8px; cursor:pointer; border-radius:8px;">
                            WITHDRAW & REFUND ₦
                        </button>
                    ` : ''}
                </div>
            `;
        }).join('');
    } catch(e) { console.error("Sync Error"); }
        }

        
        async function withdrawBet(matchId) {
    if (!currentUser) return alert("Please login first");
    
    if (!confirm("Are you sure? All slips for this match will be deleted and ₦ refunded to your balance.")) return;

    try {
        const res = await fetch(`${API}/bets/withdraw`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                userId: currentUser._id, 
                matchId: matchId 
            })
        });

        const data = await res.json();

        if (res.ok) {
            // Update local storage and UI instantly
            currentUser.balance = data.newBalance;
            localStorage.setItem('nexus_user', JSON.stringify(currentUser));
            
            alert(`✓ Refund Success! ₦${data.newBalance.toLocaleString()} is your new balance.`);
            
            // Refresh the list to show 0 slips and remove the withdraw button
            location.reload(); 
        } else {
            alert("Withdraw Denied: " + data.error);
        }
    } catch (e) {
        alert("Connection Error. Try again.");
    }
        }

        async function buySlip(matchId, pick, multiplier) {
            if(!currentUser) return toggleAuthModal();
            
            try {
                const res = await fetch(`${API}/bets/place`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: currentUser._id, matchId, pick, slips: 1, multiplier })
                });
                const data = await res.json();
                if(res.ok) {
                    currentUser.balance = data.newBalance;
                    localStorage.setItem('nexus_user', JSON.stringify(currentUser));
                    updateUI();
                    alert(`✓ Slip Purchased! Multiplier: ${multiplier}x`);
                } else alert(data.error);
            } catch(e) { alert("Betting currently unavailable"); }
        }

        window.onload = () => {
            updateUI();
            loadPredictions();
        };
        async function requestOTP() {
    const email = document.getElementById('authEmail').value;
    const btn = document.getElementById('otpBtn');
    
    if(!email || !email.includes('@')) return alert("Enter a valid email address!");

    // UI Change
    btn.innerText = "SENDING...";
    btn.disabled = true;

    try {
        const res = await fetch(`${API}/auth/request-otp`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if(res.ok) {
            // Switch to Step 2 (Code Entry)
            document.getElementById('otpStep1').style.display = 'none';
            document.getElementById('otpStep2').style.display = 'block';
        } else {
            alert(data.error || "Failed to send code.");
            btn.innerText = "SEND OTP";
            btn.disabled = false;
        }
    } catch (e) {
        alert("Server is offline or waking up. Please try again in 20 seconds.");
        btn.innerText = "SEND OTP";
        btn.disabled = false;
    }
        }

async function verifyOTP() {
    const email = document.getElementById('authEmail').value;
    const code = document.getElementById('otpCode').value;
    const btn = document.getElementById('verifyBtn');

    btn.innerText = "VERIFYING...";

    const res = await fetch(`${API}/auth/verify-otp`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, code })
    });

    const data = await res.json();
    if(res.ok) {
        localStorage.setItem('nexus_user', JSON.stringify(data.user));
        location.reload();
    } else {
        alert(data.error);
        btn.innerText = "VERIFY & ENTER ARENA";
    }
}
    </script>
</body>
</html>
