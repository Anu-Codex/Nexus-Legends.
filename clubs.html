<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franchise Directory | Nexus Legends</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --nexus-blue: #0041FF; --nexus-yellow: #E4FF00; }
        body { background: #050505; color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding-top: 100px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 5%; }

        .club-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
        
        .franchise-card {
            background: linear-gradient(145deg, #0a0a0a, #111);
            border: 1px solid #222; border-radius: 20px; padding: 30px;
            text-align: center; transition: 0.3s; position: relative;
        }
        .franchise-card:hover { border-color: var(--nexus-blue); transform: translateY(-10px); }

        .logo-frame {
            width: 100px; height: 100px; margin: 0 auto 20px;
            background: #000; border-radius: 50%; padding: 10px;
            border: 2px solid #222;
        }
        .club-logo { width: 100%; height: 100%; object-fit: contain; }

        .crp-meter {
            background: rgba(0, 65, 255, 0.1); color: var(--nexus-blue);
            font-size: 0.7rem; font-weight: 800; padding: 4px 12px;
            border-radius: 20px; display: inline-block; margin-bottom: 15px;
        }
        
        .view-btn {
            display: block; width: 100%; background: var(--nexus-blue);
            color: white; text-decoration: none; padding: 12px;
            border-radius: 8px; font-weight: 800; margin-top: 20px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
    </style>
</head>
<body>

    <header style="display:flex; justify-content:space-between; align-items:center; padding: 15px 5%; background:rgba(0,0,0,0.9); position:fixed; top:0; width:100%; z-index:1000; border-bottom:1px solid #1a1a1a;">
        <div class="logo">NEXUS <span>FRANCHISE</span></div>
        <a href="nfa.html" style="color:#555; text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> NFA</a>
    </header>

    <div class="container">
        <h1 style="text-align:center; letter-spacing:5px;">PROFESSIONAL <span style="color:var(--nexus-yellow)">CLUBS</span></h1>
        
        <div id="club-grid" class="club-grid">
            <!-- Loading -->
            <p style="text-align:center; width:100%; color:#444;">Accessing NFA Franchise Records...</p>
        </div>
    </div>

    <script>
        async function loadClubs() {
            try {
                const res = await fetch('https://nl-server-k7i9.onrender.com/api/nfa/clubs');
                const clubs = await res.json();
                
                document.getElementById('club-grid').innerHTML = clubs.map(c => `
                    <div class="franchise-card">
                        <div class="crp-meter">${c.crp} REPUTATION POINTS</div>
                        <div class="logo-frame">
                            <img src="${c.logo || 'https://via.placeholder.com/100'}" class="club-logo">
                        </div>
                        <h2 style="margin:0; text-transform:uppercase;">${c.name}</h2>
                        <p style="color:#555; font-size:0.8rem; margin:10px 0;">OWNER: ${c.owner}</p>
                        <a href="club-view.html?id=${c._id}" class="view-btn">VIEW CLUB PROFILE</a>
                    </div>
                `).join('');
            } catch(e) { console.log("Offline"); }
        }
        window.onload = loadClubs;
    </script>
</body>
</html>
