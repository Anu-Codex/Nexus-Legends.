<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Nexus Legends | Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0041FF22 0%, #050505 100%);
        }
        .login-box {
            background: #111;
            padding: 40px;
            border: 2px solid var(--accent-yellow);
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px var(--accent-yellow);
        }
        .login-box h2 {
            color: var(--accent-yellow);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            font-family: 'Rajdhani';
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--accent-yellow);
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .login-box button:hover { background: white; }
        #error-msg { color: #ff4444; font-size: 0.9rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>ADMIN ACCESS</h2>
            <input type="email" id="email" placeholder="Admin Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="checkLogin()">ENTER DASHBOARD</button>
            <p id="error-msg">Invalid Credentials! Access Denied.</p>
        </div>
    </div>

    <script>
        function checkLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // SET YOUR SPECIFIC EMAIL AND PASSWORD HERE
            if (email === "admin@nexus.com" && pass === "nexus2024") {
                window.location.href = "dashboard.html"; // Redirects to Dashboard
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
