<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Admin | Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #f8d448; --blue: #0041FF; --red: #ff4444; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: #111; padding: 20px; position: fixed; border-right: 1px solid #333; }
        .main { margin-left: 280px; padding: 40px; width: 100%; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 8px; border: 1px solid #222; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .btn-yellow { background: var(--accent); color: black; }
        .btn-red { background: var(--red); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .mgr-box { background: #1a1a1a; padding: 15px; margin-bottom: 15px; border-radius: 5px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--accent)">NEXUS ADMIN</h2>
        <p>Dashboard Control</p>
        <hr border="1" color="#222">
        <a href="index.html" style="color:var(--red); text-decoration:none; font-weight:bold;">LOGOUT</a>
    </div>

    <div class="main">
        <h1>Tournament & Player Management</h1>
        
        <div class="admin-grid">
            
            <!-- PLAYER SECTION -->
            <div class="card">
                <h3 style="color:var(--blue)">Player Controls</h3>
                <input type="text" id="newPlayerName" placeholder="New Player Name">
                <button onclick="addNewPlayer()" class="btn-blue">Add Player</button>
                <hr style="margin:20px 0; border:0; border-top:1px solid #333;">
                <select id="playerSelect"><option>Loading...</option></select>
                <div style="display:flex; gap:5px;">
                    <button onclick="updateMatch('win')" style="background:#00ff88; color:black;">WIN</button>
                    <button onclick="updateMatch('draw')" style="background:gray;">DRAW</button>
                    <button onclick="removePlayer()" class="btn-red">DELETE</button>
                </div>
            </div>

            <!-- TOURNAMENT SECTION -->
            <div class="card">
                <h3 style="color:var(--accent)">Tournament Management</h3>
                
                <div class="mgr-box">
                    <label>Manage Existing:</label>
                    <select id="tourSelect" onchange="loadTourToForm()">
                        <option value="">-- Select to Edit/Delete --</option>
                    </select>
                    <button onclick="deleteTournament()" class="btn-red" style="font-size:0.7rem; padding:5px;">DELETE SELECTED TOURNAMENT</button>
                </div>

                <input type="hidden" id="editTourId">
                <input type="text" id="tTitle" placeholder="Tournament Title">
                <input type="text" id="tTeams" placeholder="Total Teams">
                <select id="tStatus" onchange="toggleWinner()">
                    <option value="Upcoming">Upcoming</option>
                    <option value="Live">Live</option>
                    <option value="Ended">Ended</option>
                </select>
                <input type="text" id="tWinner" placeholder="Winner Name (if ended)" style="display:none; border:1px solid gold;">
                <input type="text" id="tJoin" placeholder="Join Link (WhatsApp)">
                <input type="text" id="tFixture" placeholder="Fixture Link">
                <input type="text" id="tPrize" placeholder="Prize Pool">
                <input type="date" id="tDate">
                
                <button id="submitBtn" onclick="saveTournament()" class="btn-yellow">Deploy Tournament</button>
                <button onclick="clearForm()" style="margin-top:10px; background:none; color:#666; font-size:0.7rem; border:1px solid #333;">Clear / New Form</button>
            </div>

        </div>
    </div>

    <script>
        const API = "https://nl-server-k7i9.onrender.com/api";
        let allTours = [];

        // --- LOAD DATA ---
        async function loadData() {
            // Load Players
            const pRes = await fetch(`${API}/player-list`);
            const players = await pRes.json();
            document.getElementById('playerSelect').innerHTML = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');

            // Load Tournaments
            const tRes = await fetch(`${API}/manage-tournament`);
            allTours = await tRes.json();
            const ts = document.getElementById('tourSelect');
            ts.innerHTML = '<option value="">-- Create New / Select to Edit --</option>' + 
                           allTours.map(t => `<option value="${t._id}">${t.title}</option>`).join('');
        }

        // --- TOURNAMENT LOGIC ---
        function toggleWinner() {
            document.getElementById('tWinner').style.display = (document.getElementById('tStatus').value === 'Ended') ? 'block' : 'none';
        }

        function loadTourToForm() {
            const id = document.getElementById('tourSelect').value;
            if(!id) { clearForm(); return; }
            const t = allTours.find(x => x._id === id);
            
            document.getElementById('editTourId').value = t._id;
            document.getElementById('tTitle').value = t.title;
            document.getElementById('tTeams').value = t.totalTeams;
            document.getElementById('tStatus').value = t.status;
            document.getElementById('tWinner').value = t.winner || "";
            document.getElementById('tJoin').value = t.joinLink || "";
            document.getElementById('tFixture').value = t.fixtureLink || "";
            document.getElementById('tPrize').value = t.prize;
            document.getElementById('tDate').value = t.date;
            
            toggleWinner();
            document.getElementById('submitBtn').innerText = "Update Tournament";
            document.getElementById('submitBtn').style.background = "#00ff88";
        }

        function clearForm() {
            document.getElementById('editTourId').value = "";
            document.querySelectorAll('input').forEach(i => i.value="");
            document.getElementById('submitBtn').innerText = "Deploy Tournament";
            document.getElementById('submitBtn').style.background = "var(--accent)";
            toggleWinner();
        }

        async function saveTournament() {
            const id = document.getElementById('editTourId').value;
            const data = {
                title: document.getElementById('tTitle').value,
                totalTeams: document.getElementById('tTeams').value,
                status: document.getElementById('tStatus').value,
                winner: document.getElementById('tWinner').value,
                joinLink: document.getElementById('tJoin').value,
                fixtureLink: document.getElementById('tFixture').value,
                prize: document.getElementById('tPrize').value,
                date: document.getElementById('tDate').value
            };

            const url = id ? `${API}/update-tournament` : `${API}/manage-tournament`;
            const body = id ? JSON.stringify({ id, data }) : JSON.stringify(data);

            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: body
            });
            if(res.ok) { alert("Done!"); location.reload(); }
        }

        async function deleteTournament() {
            const id = document.getElementById('tourSelect').value;
            if(!id) return alert("Select a tournament first!");
            if(!confirm("Delete this tournament forever?")) return;

            const res = await fetch(`${API}/delete-tournament`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id })
            });
            if(res.ok) { alert("Deleted!"); location.reload(); }
        }

        // --- PLAYER LOGIC ---
        async function addNewPlayer() {
            const name = document.getElementById('newPlayerName').value;
            await fetch(`${API}/add-player`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });
            location.reload();
        }

        async function removePlayer() {
            const name = document.getElementById('playerSelect').value;
            if(!confirm(`Delete ${name}?`)) return;
            await fetch(`${API}/delete-player-safe`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });
            location.reload();
        }

        window.onload = loadData;
    </script>
</body>
</html>
