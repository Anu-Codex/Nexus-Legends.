<div class="admin-form" style="background:#111; padding:20px; border:1px solid var(--accent-yellow); margin-top:20px;">
    <h3>Configure Tournament</h3>
    <input type="text" id="tTitle" placeholder="Tournament Title" style="width:100%; margin:10px 0; padding:10px;">
    <input type="text" id="tStatus" placeholder="Status (e.g. Registration Open)" style="width:100%; margin:10px 0; padding:10px;">
    <input type="text" id="tPrize" placeholder="Prize Pool" style="width:100%; margin:10px 0; padding:10px;">
    <input type="date" id="tDate" style="width:100%; margin:10px 0; padding:10px;">
    <input type="text" id="tLink" placeholder="External Link (WhatsApp/Discord)" style="width:100%; margin:10px 0; padding:10px;">
    <button onclick="saveTournament()" style="background:var(--accent-yellow); padding:10px 20px; border:none; cursor:pointer; font-weight:bold;">UPLOAD TO SITE</button>
</div>

<script>
    async function saveTournament() {
        const data = {
            title: document.getElementById('tTitle').value,
            status: document.getElementById('tStatus').value,
            prize: document.getElementById('tPrize').value,
            date: document.getElementById('tDate').value,
            link: document.getElementById('tLink').value
        };

        const response = await fetch('https://nl-server-k7i9.onrender.com/api/tournaments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if(response.ok) {
            alert("Tournament Live on Website!");
            location.reload();
        }
    }
    // Function to load names into the dropdown
async function loadPlayerNames() {
    const dropdown = document.getElementById('playerSelect');
    
    // 1. Check if dropdown exists in HTML
    if (!dropdown) {
        console.error("Could not find the 'playerSelect' element in HTML");
        return;
    }

    try {
        console.log("Fetching player list...");
        // Replace with your ACTUAL Render URL
        const res = await fetch('https://nl-server-k7i9.onrender.com/api/player-list');
        
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        
        const players = await res.json();
        console.log("Players received:", players);

        if (players.length === 0) {
            dropdown.innerHTML = '<option>No players found in database</option>';
            return;
        }

        // 2. Fill the dropdown
        dropdown.innerHTML = players.map(p => 
            `<option value="${p.name}">${p.name}</option>`
        ).join('');

        console.log("Dropdown successfully populated!");

    } catch (err) {
        console.error("Dashboard Load Error:", err);
        dropdown.innerHTML = '<option>Error loading players</option>';
    }
}

// 3. Ensure this runs as soon as the page opens
document.addEventListener('DOMContentLoaded', loadPlayerNames);

// Function to update points
async function updateMatch(result) {
    const playerName = document.getElementById('playerSelect').value;
    if (!playerName || playerName.includes("Error") || playerName.includes("No players")) {
        alert("Please select a valid player first!");
        return;
    }

    try {
        const response = await fetch('https://nl-server-k7i9.onrender.com/api/update-points', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: playerName, result: result })
        });

        if (response.ok) {
            alert(`SUCCESS: Added ${result} to ${playerName}`);
        } else {
            alert("Failed to update points. Check server logs.");
        }
    } catch (error) {
        console.error("Update Error:", error);
        alert("Network error. Could not connect to server.");
    }
}
</script>
