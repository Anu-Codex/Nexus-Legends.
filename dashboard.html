<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Power Admin | v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- PDF LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { 
            --accent: #f8d448; --blue: #0041FF; --red: #ff4444; --green: #00ff88;
            --bg: #050505; --card: #111; --border: #222;
        }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { position: sticky; top: 0; z-index: 1000; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .header-brand h2 { color: var(--accent); margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        .header-brand p { color: #555; margin: 0; font-size: 0.8rem; text-transform: uppercase; }
        .header-btns { display: flex; gap: 10px; }
        .header-btns button { width: auto; padding: 8px 15px; font-size: 0.8rem; }
        .main-container { padding: 25px 5%; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; align-items: start; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); transition: 0.3s ease; }
        .card:hover { border-color: #333; transform: translateY(-3px); }
        h3 { margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;}
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 6px; font-family: inherit; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--accent); }
        button { width: 100%; padding: 12px; border: none; font-weight: 700; cursor: pointer; border-radius: 6px; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .btn-yellow { background: var(--accent); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #888; }
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: var(--green); color: black; border-radius: 8px; font-weight: bold; transform: translateY(100px); transition: 0.4s; z-index: 2000; }
        @media (max-width: 600px) { .header-brand h2 { font-size: 1.2rem; } .dashboard-grid { grid-template-columns: 1fr; } }
        

    </style>
</head>
<body>
    <div id="toast">Success!</div>
    <header>
        <div class="header-brand"><h2>NEXUS ADMIN</h2><p>Management Suite</p></div>
        <div class="header-btns">
            <button class="btn-outline" onclick="location.reload()">REFRESH</button>
            <button class="btn-red" onclick="window.location.href='index.html'">LOGOUT</button>
        </div>
    </header>

    <div class="main-container">
        <div class="dashboard-grid">
            <!-- PLAYER REGISTRATION -->
            <div class="card" style="border-left: 4px solid var(--blue);">
                <h3><i class="fa-solid fa-user-plus"></i> Add New Player</h3>
                <input type="text" id="newPlayerName" placeholder="Enter Full Name">
                <button onclick="addPlayer()" class="btn-blue">Register to Database</button>
            </div>

            <!-- PLAYER SCORING -->
            <div class="card" style="border-left: 4px solid var(--green);">
                <h3><i class="fa-solid fa-ranking-star"></i> Player Scoring</h3>
                <select id="playerSelect"><option>Loading Arena...</option></select>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                    <button onclick="rankAction('update-points', {result:'win'})" style="background:var(--green); color:black;">WIN</button>
                    <button onclick="rankAction('update-points', {result:'draw'})" style="background:#555;">DRAW</button>
                    <button onclick="rankAction('update-points', {result:'loss'})" style="background:#222;">LOSS</button>
                </div>
                <div style="margin-top:15px; display:flex; gap:5px;">
                    <input type="text" id="trophyInput" placeholder="Performance (e.g. 🏆 Winner)" style="margin:0;">
                    <button onclick="updateTrophies()" class="btn-blue" style="width:80px; background:var(--accent); color:black;">SAVE</button>
                </div>
                <div style="margin-top:20px; padding-top:20px; border-top:1px solid #222;">
                    <p style="color:var(--red); font-size:0.7rem; font-weight:bold;">DANGER ZONE</p>
                    <button onclick="resetAll()" class="btn-outline" style="color:#fff; border-color:#555; margin-bottom:10px; font-size:0.7rem;">RESET ALL STATS</button>
                    <button onclick="deletePlayer()" class="btn-red" style="font-size:0.7rem;">DELETE PLAYER</button>
                </div>
            </div>
            <!-- PLAYER PROFILE MANAGER -->
<div class="card" style="border-left: 4px solid var(--accent);">
    <h3><i class="fa-solid fa-id-card"></i> Profile Manager</h3>
    <select id="profilePlayerSelect"><option>Select Player</option></select>
    <input type="text" id="pAvatar" placeholder="Avatar Link (PNG)">
    <input type="text" id="pStyle" placeholder="Playstyle (e.g. Quick Counter)">
    <input type="text" id="pForm" placeholder="Fav Formation (e.g. 4-2-4)">
    <input type="text" id="pSig" placeholder="Signature Player">
    <button onclick="updatePlayerProfile()" class="btn-yellow">Update Card</button>
</div>

            <!-- TOURNAMENT CONTROLLER -->
            <div class="card" style="border-left: 4px solid var(--accent);">
                <h3><i class="fa-solid fa-gamepad"></i> Tournament Controller</h3>
                <select id="tourSelect" onchange="fillTourForm()"><option value="">+ CREATE NEW</option></select>
                <div id="tourForm">
                    <input type="hidden" id="editId">
                    <input type="text" id="tTitle" placeholder="Tournament Name">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input type="text" id="tTeams" placeholder="Teams Count">
                        <select id="tStatus" onchange="toggleWinField()">
                            <option value="Upcoming">Upcoming</option><option value="Live">Live</option><option value="Ended">Ended</option>
                        </select>
                    </div>
                    <select id="tTableType"><option value="Normal">Normal Standings</option><option value="Group">Group Standings</option></select>
                    <input type="text" id="tWinner" placeholder="Winner Name" style="display:none; border: 1px solid gold;">
                    <input type="text" id="tJoin" placeholder="WhatsApp Link">
                    <input type="text" id="tFixture" placeholder="Brackets Link">
                    <input type="text" id="tRoster" placeholder="Roster Link">
                    <input type="text" id="tPrize" placeholder="Prize Pool">
                    <input type="date" id="tDate">
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button id="subBtn" onclick="submitTour()" class="btn-yellow" style="flex:2;">Deploy</button>
                        <button id="delBtn" onclick="deleteTour()" class="btn-red" style="flex:1; display:none;">Del</button>
                        <!-- NEW EXPORT BUTTON -->
                    <button onclick="exportTournamentPDF()" class="btn-outline" style="margin-top:10px; color:var(--accent); border-color:var(--accent);">
                        <i class="fa-solid fa-file-pdf"></i> EXPORT TOURNAMENT REPORT
                    </button>
                    </div>
                </div>
            </div>

            <!-- ROSTER & TEAM BUILDER -->
            <div class="card" style="border-left: 4px solid #00ff88;">
                <h3><i class="fa-solid fa-users-gear"></i> Roster & Team Builder</h3>
                <select id="rosterTourSelect" onchange="loadRosterList()"><option value="">-- Select Tournament --</option></select>
                <div id="rosterEditor" style="display:none;">
                    <input type="text" id="rosTeam" placeholder="Team Name">
                    <input type="text" id="rosPlayer" placeholder="Player Name">
                    <input type="text" id="rosGroup" placeholder="Group (e.g. Group A)" value="Group A">
                    <button onclick="addToRoster()" class="btn-yellow" style="background:#00ff88; color:black; margin-top:10px;">ADD TO TEAM</button>
                    <div id="currentRoster" style="margin-top:20px; max-height: 250px; overflow-y: auto;"></div>
                </div>
            </div>

            <!-- FIXTURES & RESULTS -->
            <div class="card" style="border-left: 4px solid var(--red);">
                <h3><i class="fa-solid fa-stadium"></i> Fixtures & Results</h3>
                <select id="fixTourSelect" onchange="loadFixtureManager()"><option value="">-- Select Tournament --</option></select>
                <div id="fixtureEditor" style="display:none;">
                    <div style="display:flex; gap:5px; margin: 10px 0;">
                        <input type="text" id="newStageName" placeholder="New Stage">
                        <button onclick="manageFixture('add-stage')" class="btn-blue" style="width:80px; background:var(--red);">+ STAGE</button>
                    </div>
                    <div id="stagesList"></div>
                </div>
            </div>

            <!-- BROADCAST -->
            <div class="card" style="border-left: 4px solid #ff00ff;">
                <h3><i class="fa-solid fa-bullhorn"></i> Broadcast Center</h3>
                <textarea id="annMsg" placeholder="Type message..." style="height:80px;"></textarea>
                <div style="display:flex; gap:10px;">
                    <button onclick="broadcast()" class="btn-blue" style="background:#ff00ff; flex:3;">Push</button>
                    <button onclick="clearAnnouncements()" class="btn-outline" style="flex:1; color:red; border-color:red;">Clear</button>
                </div>
            </div>

            <!-- STORE -->
            <div class="card" style="border-left: 4px solid #00d2ff;">
                <h3><i class="fa-solid fa-cart-shopping"></i> Store Manager</h3>
                <input type="text" id="itemName" placeholder="Product">
                <input type="text" id="itemPrice" placeholder="Price">
                <input type="text" id="itemImg" placeholder="Image URL">
                <select id="itemCat"><option value="Standard">Standard</option><option value="Special">Special</option><option value="Discount">Discount</option></select>
                <button onclick="addStoreItem()" class="btn-blue" style="background:#00d2ff; color:black;">Add Item</button>
                <div id="adminStoreList" style="margin-top:10px; max-height:150px; overflow-y:auto;"></div>
            </div>

            <!-- NEWSLETTER -->
            <div class="card" style="border-left: 4px solid #ffaa00;">
                <h3><i class="fa-solid fa-envelope-open-text"></i> Newsletter</h3>
                <button onclick="loadSubscribers()" class="btn-outline">Refresh Emails</button>
                <div id="subList" style="margin-top:10px; max-height:150px; overflow-y:auto; font-size:0.8rem;"></div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://nl-server-k7i9.onrender.com/api";
        let toursData = [];

        function notify(msg, color = "#00ff88") {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.background = color;
            t.style.transform = "translateY(0)";
            setTimeout(() => { t.style.transform = "translateY(100px)"; }, 3000);
        }

        async function loadEverything() {
            try {
                const [pRes, tRes] = await Promise.all([
                    fetch(`${API}/player-list`).then(r => r.json()),
                    fetch(`${API}/manage-tournament`).then(r => r.json())
                ]);
                const pOpts = pRes.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
                document.getElementById('playerSelect').innerHTML = pOpts;
                document.getElementById('profilePlayerSelect').innerHTML = pOpts; // This line fix the profile manager
                toursData = tRes;
                const opts = tRes.map(t => `<option value="${t._id}">${t.title}</option>`).join('');
                document.getElementById('tourSelect').innerHTML = '<option value="">+ CREATE NEW</option>' + opts;
                document.getElementById('rosterTourSelect').innerHTML = '<option value="">-- Select Tournament --</option>' + opts;
                document.getElementById('fixTourSelect').innerHTML = '<option value="">-- Select Tournament --</option>' + opts;
                loadAdminStore();
            } catch (e) { notify("Sync Failed", "#ff4444"); console.error(e); }
        }

        async function addPlayer() {
            const name = document.getElementById('newPlayerName').value;
            if(!name) return;
            const res = await fetch(`${API}/add-player`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) });
            if(res.ok) { notify("Registered!"); document.getElementById('newPlayerName').value = ""; loadEverything(); }
        }

        async function rankAction(endpoint, data) {
            const name = document.getElementById('playerSelect').value;
            await fetch(`${API}/${endpoint}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, ...data }) });
            notify("Updated!");
        }

        async function updateTrophies() {
            const name = document.getElementById('playerSelect').value;
            const trophies = document.getElementById('trophyInput').value;
            await fetch(`${API}/update-trophies`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, trophies }) });
            notify("Saved!");
        }

        async function resetAll() {
            if (prompt("Type 'nexus2024' to wipe stats") === "nexus2024") { await fetch(`${API}/reset-rankings`, { method: 'POST' }); loadEverything(); }
        }

        async function deletePlayer() {
            const name = document.getElementById('playerSelect').value;
            if(confirm(`Delete ${name}?`)) { await fetch(`${API}/delete-player-safe`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) }); loadEverything(); }
        }

        function toggleWinField() { document.getElementById('tWinner').style.display = (document.getElementById('tStatus').value === 'Ended') ? 'block' : 'none'; }
        function resetTourForm() { document.getElementById('editId').value = ""; document.querySelectorAll('#tourForm input').forEach(i => i.value = ""); document.getElementById('delBtn').style.display = "none"; toggleWinField(); }

        function fillTourForm() {
            const id = document.getElementById('tourSelect').value;
            if(!id) return resetTourForm();
            const t = toursData.find(x => x._id === id);
            document.getElementById('editId').value = t._id;
            document.getElementById('tTitle').value = t.title;
            document.getElementById('tTeams').value = t.totalTeams;
            document.getElementById('tStatus').value = t.status;
            document.getElementById('tTableType').value = t.tableType || "Normal";
            document.getElementById('tWinner').value = t.winner || "";
            document.getElementById('tJoin').value = t.joinLink || "";
            document.getElementById('tFixture').value = t.fixtureLink || "";
            document.getElementById('tRoster').value = t.rosterLink || "";
            document.getElementById('tPrize').value = t.prize || "";
            document.getElementById('tDate').value = t.date || "";
            document.getElementById('delBtn').style.display = "block";
            toggleWinField();
        }

        async function submitTour() {
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('tTitle').value,
                totalTeams: document.getElementById('tTeams').value,
                status: document.getElementById('tStatus').value,
                tableType: document.getElementById('tTableType').value,
                winner: document.getElementById('tWinner').value,
                joinLink: document.getElementById('tJoin').value,
                fixtureLink: document.getElementById('tFixture').value,
                rosterLink: document.getElementById('tRoster').value,
                prize: document.getElementById('tPrize').value,
                date: document.getElementById('tDate').value
            };
            const endpoint = id ? 'update-tournament' : 'manage-tournament';
            await fetch(`${API}/${endpoint}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(id ? {id, data} : data) });
            notify("Tournament Live!"); loadEverything();
        }

        async function deleteTour() { if(confirm("Delete?")) { await fetch(`${API}/delete-tournament`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: document.getElementById('editId').value }) }); resetTourForm(); loadEverything(); } }

        async function loadRosterList() {
            const id = document.getElementById('rosterTourSelect').value;
            if(!id) { document.getElementById('rosterEditor').style.display="none"; return; }
            document.getElementById('rosterEditor').style.display="block";
            const t = toursData.find(x => x._id === id);
            document.getElementById('currentRoster').innerHTML = (t.roster || []).map(team => `
                <div style="background:#000; padding:10px; margin-bottom:10px; border-radius:8px; border-left:3px solid #00ff88;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom:1px solid #222; padding-bottom:5px;">
                        <b style="font-size:0.9rem;">${team.teamName} <small style="color:#555;">(${team.groupName})</small></b>
                        <div style="display:flex; gap:10px;">
                            <i class="fa-solid fa-pen-to-square" onclick="promptRename('${t._id}', '${team.teamName}')" style="color:var(--accent); cursor:pointer; font-size:0.8rem;"></i>
                            <i class="fa-solid fa-trash" onclick="removeTeam('${team._id}')" style="color:red; cursor:pointer; font-size:0.8rem;"></i>
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        ${team.players.map(p => `
                            <div style="display:flex; justify-content:space-between; background:rgba(255,255,255,0.03); padding:5px; border-radius:4px;">
                                <span style="font-size:0.8rem;">${p}</span>
                                <div style="display:flex; gap:10px;">
                                    <i class="fa-solid fa-user-pen" onclick="promptPlayerRename('${t._id}', '${p}')" style="color:var(--blue); cursor:pointer; font-size:0.7rem;"></i>
                                    <i class="fa-solid fa-user-minus" onclick="removePlayerFromRoster('${t._id}', '${team._id}', '${p}')" style="color:red; cursor:pointer; font-size:0.7rem;"></i>
                                </div>
                            </div>`).join('')}
                    </div>
                </div>`).join('');
        }

        async function promptRename(tourId, oldName) { let n = prompt(`Rename ${oldName}:`, oldName); if(n && n !== oldName) { await fetch(`${API}/edit-team-name`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tourId, oldName, newName: n}) }); await loadEverything(); loadRosterList(); } }
        async function promptPlayerRename(tourId, oldName) { let n = prompt(`Rename ${oldName}:`, oldName); if(n && n !== oldName) { await fetch(`${API}/edit-player-name`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tourId, oldName, newName: n}) }); await loadEverything(); loadRosterList(); } }
        async function removePlayerFromRoster(tourId, teamId, playerName) { if(confirm(`Remove ${playerName}?`)) { await fetch(`${API}/remove-player-roster`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tourId, teamId, playerName}) }); await loadEverything(); loadRosterList(); } }
        async function addToRoster() { await fetch(`${API}/update-roster`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tourId: document.getElementById('rosterTourSelect').value, teamName: document.getElementById('rosTeam').value, playerName: document.getElementById('rosPlayer').value, groupName: document.getElementById('rosGroup').value, action: 'add' }) }); await loadEverything(); loadRosterList(); }
        async function removeTeam(teamId) { await fetch(`${API}/update-roster`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tourId: document.getElementById('rosterTourSelect').value, teamId, action: 'remove-team' }) }); await loadEverything(); loadRosterList(); }

        async function loadFixtureManager() {
            const id = document.getElementById('fixTourSelect').value;
            if(!id) { document.getElementById('fixtureEditor').style.display="none"; return; }
            document.getElementById('fixtureEditor').style.display="block";
            const t = toursData.find(x => x._id === id);
            document.getElementById('stagesList').innerHTML = (t.fixtures || []).map(stage => `
                <div style="background:#000; border:1px solid #333; padding:15px; border-radius:10px; margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between; color:var(--red); font-weight:bold; margin-bottom:10px;">
                        <span>${stage.stageName}</span><i class="fa-solid fa-trash" onclick="manageFixture('delete-stage', {stageId:'${stage._id}'})" style="cursor:pointer;"></i>
                    </div>
                    ${stage.matches.map(m => `
                        <div style="display:grid; grid-template-columns: 1fr 40px 10px 40px 1fr 40px 40px; gap:5px; margin-bottom:8px; align-items:center;">
                            <div style="display:flex; flex-direction:column; align-items:flex-end;"><span style="font-size:0.7rem;">${m.p1}</span><i class="fa-solid fa-pen" onclick="renameMatchPlayer('${stage._id}', '${m._id}', 'p1', '${m.p1}')" style="font-size:0.5rem; color:#444; cursor:pointer;"></i></div>
                            <input type="text" value="${m.s1}" id="s1_${m._id}" style="padding:4px; text-align:center; margin:0;"><span>-</span>
                            <input type="text" value="${m.s2}" id="s2_${m._id}" style="padding:4px; text-align:center; margin:0;">
                            <div style="display:flex; flex-direction:column; align-items:flex-start;"><span style="font-size:0.7rem;">${m.p2}</span><i class="fa-solid fa-pen" onclick="renameMatchPlayer('${stage._id}', '${m._id}', 'p2', '${m.p2}')" style="font-size:0.5rem; color:#444; cursor:pointer;"></i></div>
                            <button onclick="updateMatchScore('${stage._id}', '${m._id}')" style="background:var(--green); color:black; padding:5px;"><i class="fa-solid fa-save"></i></button>
                            <div style="display:flex; gap:5px;">
                                ${m.evidence ? `<i class="fa-solid fa-eye" onclick="window.open('${m.evidence}', '_blank')" style="color:var(--green); cursor:pointer;"></i><i class="fa-solid fa-trash-can" onclick="deleteProof('${stage._id}', '${m._id}')" style="color:var(--red); cursor:pointer;"></i>` : `<i class="fa-solid fa-eye-slash" style="color:#222;"></i>`}
                            </div>
                        </div>`).join('')}
                    <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:5px; border-top:1px solid #222; padding-top:10px;">
                        <input type="text" id="p1_${stage._id}" placeholder="T1"><input type="text" id="p2_${stage._id}" placeholder="T2"><button onclick="addMatchToStage('${stage._id}')" style="background:#444; width:40px;">+</button>
                    </div>
                </div>`).join('');
        }

        async function renameMatchPlayer(stageId, matchId, k, cur) { let n = prompt(`Edit match name:`, cur); if(n && n !== cur) { let b = {tourId: document.getElementById('fixTourSelect').value, stageId, matchId}; b[k] = n; await fetch(`${API}/edit-match-player`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)}); await loadEverything(); loadFixtureManager(); } }
        async function manageFixture(action, extraData = {}) { await fetch(`${API}/update-fixtures`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tourId: document.getElementById('fixTourSelect').value, stageName: document.getElementById('newStageName').value, action, ...extraData }) }); await loadEverything(); loadFixtureManager(); }
        async function addMatchToStage(stageId) { await fetch(`${API}/update-fixtures`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tourId: document.getElementById('fixTourSelect').value, stageId, action: 'add-match', matchData: { p1: document.getElementById(`p1_${stageId}`).value, p2: document.getElementById(`p2_${stageId}`).value } }) }); await loadEverything(); loadFixtureManager(); }
        async function updateMatchScore(stageId, matchId) { await fetch(`${API}/update-fixtures`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tourId: document.getElementById('fixTourSelect').value, stageId, matchId, action: 'update-score', matchData: { s1: document.getElementById(`s1_${matchId}`).value, s2: document.getElementById(`s2_${matchId}`).value } }) }); notify("Saved!"); await loadEverything(); loadFixtureManager(); }
        async function deleteProof(stageId, matchId) { if(confirm("Delete proof?")) { await fetch(`${API}/delete-evidence`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tourId:document.getElementById('fixTourSelect').value, stageId, matchId}) }); await loadEverything(); loadFixtureManager(); } }
        function exportTournamentPDF() {
            const id = document.getElementById('tourSelect').value;
            if(!id) return alert("Select a tournament first!");
            const t = toursData.find(x => x._id === id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // 1. Header
            doc.setFillColor(0, 65, 255);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("NEXUS LEGENDS ARENA", 105, 20, { align: 'center' });
            doc.setFontSize(14);
            doc.text(t.title, 105, 32, { align: 'center' });
            // 2. Info Section
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text(`Generated: ${new Date().toLocaleString()}`, 15, 50);
            doc.text(`Prize Pool: ${t.prize}`, 15, 56);
            doc.text(`Date: ${t.date}`, 15, 62);

            // 3. Points Table (STANDINGS) Calculation
            let stats = {};
            (t.roster || []).forEach(tm => stats[tm.teamName] = { name: tm.teamName, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 });
            (t.fixtures || []).forEach(stg => stg.matches.forEach(m => {
                if(m.s1 !== "-" && m.s2 !== "-" && stats[m.p1] && stats[m.p2]){
                    let s1 = parseInt(m.s1), s2 = parseInt(m.s2);
                    stats[m.p1].p++; stats[m.p2].p++; stats[m.p1].gf += s1; stats[m.p1].ga += s2; stats[m.p2].gf += s2; stats[m.p2].ga += s1;
                    if(s1 > s2){ stats[m.p1].w++; stats[m.p1].pts += 3; stats[m.p2].l++; }
                    else if(s2 > s1){ stats[m.p2].w++; stats[m.p2].pts += 3; stats[m.p1].l++; }
                    else { stats[m.p1].d++; stats[m.p2].d++; stats[m.p1].pts += 1; stats[m.p2].pts += 1; }
                }
            }));
            const tableData = Object.values(stats)
                .sort((a,b) => (b.pts - a.pts) || ((b.gf-b.ga)-(a.gf-a.ga)) || (b.gf-a.gf))
                .map((s,i) => [i+1, s.name, s.p, s.w, s.d, s.l, s.gf, s.ga, s.gf-s.ga, s.pts]);

            doc.autoTable({
                head: [['#', 'TEAM', 'P', 'W', 'D', 'L', 'GF', 'GA', 'GD', 'PTS']],
                body: tableData,
                startY: 70,
                theme: 'grid',
                headStyles: { fillColor: [0, 65, 255] }
            });
            // 4. Fixtures Section
            let fixturesData = [];
            (t.fixtures || []).forEach(stg => {
                stg.matches.forEach(m => {
                    fixturesData.push([stg.stageName, `${m.p1} vs ${m.p2}`, `${m.s1} - ${m.s2}`]);
                });
            });
            
            if(fixturesData.length > 0) {
                doc.text("FIXTURES & RESULTS", 15, doc.lastAutoTable.finalY + 15);
                doc.autoTable({
                    head: [['STAGE', 'MATCH', 'SCORE']],
                    body: fixturesData,
                    startY: doc.lastAutoTable.finalY + 20,
                    theme: 'striped',
                    headStyles: { fillColor: [255, 68, 68] }
                });
            }

            // 5. Roster Section
            let rosterData = (t.roster || []).map(r => [r.teamName, r.players.join(', ')]);
            if(rosterData.length > 0) {
                doc.addPage();
                doc.text("TEAM ROSTERS", 15, 20);
                doc.autoTable({
                    head: [['TEAM', 'PLAYERS']],
                    body: rosterData,
                    startY: 25,
                    theme: 'grid',
                    headStyles: { fillColor: [0, 255, 136], textColor: [0,0,0] }
                });
            }

            doc.save(`Nexus_${t.title}_Report.pdf`);
        }
        async function updatePlayerProfile() {
    const name = document.getElementById('profilePlayerSelect').value;
    const data = {
        avatar: document.getElementById('pAvatar').value,
        playstyle: document.getElementById('pStyle').value,
        formation: document.getElementById('pForm').value,
        signaturePlayer: document.getElementById('pSig').value
    };
    await fetch(`${API}/update-profile`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, data }) });
    notify("Profile Card Updated!");
        }
        

        async function broadcast() { await fetch(`${API}/announcement`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: document.getElementById('annMsg').value }) }); notify("Pushed!"); }
        async function clearAnnouncements() { if(confirm("Wipe?")) { await fetch(`${API}/clear-announcements`, { method: 'POST' }); notify("Wiped!"); } }
        async function addStoreItem() { await fetch(`${API}/manage-store`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'add', data: { name: document.getElementById('itemName').value, price: document.getElementById('itemPrice').value, image: document.getElementById('itemImg').value, category: document.getElementById('itemCat').value } }) }); loadAdminStore(); }
        async function loadAdminStore() { const res = await fetch(`${API}/store`); const items = await res.json(); document.getElementById('adminStoreList').innerHTML = items.map(i => `<div style="padding:5px; border-bottom:1px solid #222;">${i.name} <i class="fa-solid fa-trash" onclick="deleteStoreItem('${i._id}')" style="float:right; color:red; cursor:pointer;"></i></div>`).join(''); }
        async function deleteStoreItem(id) { await fetch(`${API}/manage-store`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'delete', id }) }); loadAdminStore(); }
        async function loadSubscribers() { const res = await fetch(`${API}/subscribers`); const data = await res.json(); document.getElementById('subList').innerHTML = data.map(s => `<div style="padding:5px; border-bottom:1px solid #222;">${s.email}</div>`).join(''); }

        window.onload = loadEverything;
    </script>
